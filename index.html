  </svg>`;
}

function floatingBibis(count=6, colors=["#0D9B7E"]){
  const anims = ["floatBibi","floatBibi2","floatBibi3"];
  let html = "";
  for(let i=0;i<count;i++){
    const size = 60 + Math.random()*80;
    const x = Math.random()*90;
    const y = Math.random()*90;
    const anim = anims[i%3];
    const dur = 4 + Math.random()*4;
    const delay = Math.random()*3;
    const color = colors[i%colors.length];
    html += `<div class="bg-bibi" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;animation:${anim} ${dur}s ${delay}s ease-in-out infinite">${bgBibiSVG(size,color)}</div>`;
  }
  return html;
}

function getAgeGroup(age){
  if(!age || age<=8) return "young";
  if(age<=12) return "middle";
  return "teen";
}

function floatingBubbles(children=[]){
  // Get all unique age groups from children
  const groups = children.length > 0 
    ? [...new Set(children.map(c=>getAgeGroup(c.age)))]
    : ["young","middle"];
  
  // Mix content from all children's age groups
  let allQ = [], allC = [];
  groups.forEach(g=>{
    allQ.push(...BUBBLE_CONTENT[g].questions);
    allC.push(...BUBBLE_CONTENT[g].chat);
  });
  
  // Shuffle
  const shuffle = arr => arr.sort(()=>Math.random()-.5);
  allQ = shuffle(allQ).slice(0,8);
  allC = shuffle(allC).slice(0,7);
  
  const anims = ["floatBibi","floatBibi2","floatBibi3"];
  const positions = [
    {x:2,y:5},{x:65,y:3},{x:80,y:15},{x:5,y:25},{x:70,y:28},
    {x:15,y:45},{x:75,y:42},{x:3,y:60},{x:60,y:58},{x:85,y:60},
    {x:10,y:75},{x:55,y:72},{x:80,y:78},{x:20,y:88},{x:65,y:88}
  ];
  
  let html = "";
  const allBubbles = [
    ...allQ.map(t=>({text:t,type:"question"})),
    ...allC.map(t=>({text:t,type:"chat"}))
  ];
  shuffle(allBubbles);
  
  allBubbles.slice(0,15).forEach((b,i)=>{
    const pos = positions[i%positions.length];
    const anim = anims[i%3];
    const dur = 5+Math.random()*5;
    const delay = Math.random()*4;
    const isQ = b.type==="question";
    const bg = isQ ? "rgba(13,155,126,0.12)" : "rgba(255,255,255,0.10)";
    const border = isQ ? "1.5px solid rgba(13,155,126,0.25)" : "1.5px solid rgba(255,255,255,0.18)";
    const textColor = isQ ? "rgba(13,155,126,0.7)" : "rgba(255,255,255,0.55)";
    html += `<div style="position:absolute;left:${pos.x}%;top:${pos.y}%;background:${bg};border:${border};border-radius:20px;padding:8px 14px;font-size:12px;font-weight:700;color:${textColor};white-space:nowrap;animation:${anim} ${dur}s ${delay}s ease-in-out infinite;pointer-events:none;max-width:200px;backdrop-filter:blur(4px)">${b.text}</div>`;
  });
  return html;
}

// TOPIC DETECTION & PROMPT

const TOPICS = {
  "Matematik":["matematik","sayı","toplama","çıkarma","çarpma","bölme","kesir","geometri","denklem","yüzde"],
  "Fen":["fen","fizik","kimya","biyoloji","deney","atom","hücre","enerji","kuvvet","gezegen"],
  "Dil":["türkçe","kelime","cümle","hikaye","şiir","okuma","dilbilgisi","ingilizce","dil"],
  "Tarih":["tarih","osmanlı","atatürk","savaş","medeniyet","cumhuriyet"],
};
function detectTopic(t){
  const l=t.toLowerCase();
  for(const[k,v]of Object.entries(TOPICS)) if(v.some(w=>l.includes(w))) return k;
  return "Genel";
}

// Sokratik ödev sinyalleri — bu kelimeler geçiyorsa "homework mode" aktif olur
const HOMEWORK_SIGNALS = ["ödev","nasıl çözülür","nasıl yapılır","cevap nedir","sonuç ne","bul","hesapla","çöz"];
function isHomeworkQuestion(t){
  const l=t.toLowerCase();
  return HOMEWORK_SIGNALS.some(w=>l.includes(w));
}

// Ustalık skoru — her konuda mesaj attıkça yavaşça artar (basit, kademeli model)
async function updateMastery(childId, topic){
  if(topic==="Genel") return;
  try{
    const {data:existing} = await sb.from("mastery").select("*").eq("child_id",childId).eq("topic",topic).single();
    if(existing){
      const newScore = Math.min(100, existing.score + 2);
      await sb.from("mastery").update({score:newScore, message_count:existing.message_count+1, updated_at:new Date().toISOString()}).eq("id",existing.id);
    } else {
      await sb.from("mastery").insert({child_id:childId, topic, score:8, message_count:1});
    }
  }catch(e){
    // mastery tablosu yoksa veya satır bulunamazsa sessizce devam et
    await sb.from("mastery").insert({child_id:childId, topic, score:8, message_count:1}).then(()=>{}).catch(()=>{});
  }
}

  const tone = child.age<=8
    ? "Çok kısa cümleler kur. Somut örnekler ver. Bol emoji kullan 😊 Oyunlaştır her şeyi."

    : "Neredeyse akran gibi konuş. Az emoji. Daha derin açıklamalar.";
  const gender = child.gender==="kız" ? "kız" : "erkek";
  return `Sen Bibi'sin — ${child.age} yaşında ${gender} çocuk olan ${child.name} için özel AI öğrenme arkadaşısın.
Sınıfı: ${child.grade||"?"}

Bunun yerine:
1. Önce çocuğun problemi nasıl anladığını sor ("Sence bu soru bize ne soruyor?")
2. Küçük adımlara böl, her adımda bir soru sor
3. Çocuk bir adımda takılırsa ipucu ver ama cevabı söyleme
4. Çocuk kendi kendine doğru cevaba ulaşınca büyük bir coşkuyla kutla
5. Sadece çocuk 3 kez denedikten sonra hâlâ bulamazsa, çok yakın bir ipucu ver (yine de tam cevabı verme)
Örnek: Çocuk "7x8 kaç eder?" diye sorarsa, direkt "56" deme. "7'yi 8 kere toplasak ne olur? Önce 7x4'ü bulalım mı?" gibi sorularla yönlendir.

DİL: Türkçe. Çocuk başka dil yazarsa o dilde yanıt ver.
GÜVENLİK: Kişisel bilgi sorma. Üzgün göründüğünde nazikçe yönlendir.
Kısa ve odaklı cevaplar ver. Çok uzun paragraflar yazma.`;
}

// BACKGROUND THEME (by child gender & age)
// ══════════════════════════════════════════════════════════════
function getTheme(child){
  if(!child) return { bg:"linear-gradient(135deg,#1A2E2A 0%,#243d38 100%)", header:"linear-gradient(135deg,#0D9B7E,#0a7a63)", bubble:"#0D9B7E", colors:["#0D9B7E"] };
  const isGirl = child.gender==="kız";
  const isYoung = child.age<=8;
  if(isGirl && isYoung) return {
    bg:"linear-gradient(135deg,#2d1b3d 0%,#1a1040 50%,#2d0f2d 100%)",
    header:"linear-gradient(135deg,#b5449a,#7c2d8e)",
    bubble:"#b5449a", colors:["#e879c8","#a855f7","#ec4899"],
    stars:true
  };
  if(isGirl && !isYoung) return {
    bg:"linear-gradient(135deg,#1e1040 0%,#2d1b4e 100%)",
    header:"linear-gradient(135deg,#7c3aed,#5b21b6)",
    bubble:"#7c3aed", colors:["#a78bfa","#c084fc","#e879c8"],
    stars:true
  };
  if(!isGirl && isYoung) return {
    bg:"linear-gradient(135deg,#0c2340 0%,#1a3a5c 100%)",
    header:"linear-gradient(135deg,#2563eb,#1d4ed8)",
    bubble:"#2563eb", colors:["#3b82f6","#0ea5e9","#0D9B7E"]
  };
  return {
    bg:"linear-gradient(135deg,#1a2e2a 0%,#0f2535 100%)",
    header:"linear-gradient(135deg,#0D9B7E,#0369a1)",
    bubble:"#0D9B7E", colors:["#0D9B7E","#0ea5e9","#3b82f6"]
  };
}

let regMethod = "email", loginMethodCurrent = "email", selectedGender = "";

function switchAuthMode(mode){
  authMode = mode;
  el("tab-login").style.background = mode==="login" ? "#0D9B7E" : "transparent";
  el("tab-login").style.color = mode==="login" ? "white" : "rgba(255,255,255,.45)";
  el("tab-reg").style.background = mode==="register" ? "#0D9B7E" : "transparent";
  el("tab-reg").style.color = mode==="register" ? "white" : "rgba(255,255,255,.45)";
  el("login-form").classList.toggle("hidden", mode!=="login");
  showStep(mode==="register" ? 1 : 0);
}

function showStep(step){
  [1,2,3].forEach(s => {
    const e = el(`reg-form-${s}`);
    if(e){ e.classList.toggle("hidden", s!==step); }
  });
}

function switchMethod(m){
  loginMethodCurrent = m;
  el("m-email").style.background = m==="email" ? "rgba(255,255,255,.15)" : "transparent";
  el("m-email").style.borderColor = m==="email" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("m-email").style.color = m==="email" ? "white" : "rgba(255,255,255,.45)";
  el("m-phone").style.background = m==="phone" ? "rgba(255,255,255,.15)" : "transparent";
  el("m-phone").style.borderColor = m==="phone" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("m-phone").style.color = m==="phone" ? "white" : "rgba(255,255,255,.45)";
  el("login-email-fields").classList.toggle("hidden", m!=="email");
  el("login-phone-fields").classList.toggle("hidden", m!=="phone");
  el("login-btn").textContent = m==="phone" ? "Kod Gönder →" : "Giriş Yap →";
  el("login-btn").onclick = m==="phone" ? doLoginPhone : doLogin;
}

function switchRegMethod(m){
  regMethod = m;
  el("rm-email").style.background = m==="email" ? "rgba(255,255,255,.15)" : "transparent";
  el("rm-email").style.borderColor = m==="email" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("rm-email").style.color = m==="email" ? "white" : "rgba(255,255,255,.45)";
  el("rm-phone").style.background = m==="phone" ? "rgba(255,255,255,.15)" : "transparent";
  el("rm-phone").style.borderColor = m==="phone" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("rm-phone").style.color = m==="phone" ? "white" : "rgba(255,255,255,.45)";
  el("reg-email-fields").classList.toggle("hidden", m!=="email");
  el("reg-phone-fields").classList.toggle("hidden", m!=="phone");
}

function selectGender(g){
  selectedGender = g;
  ["kiz","erkek"].forEach(id => {
    const btn = el(`g-${id}`);
    const active = (id==="kiz"&&g==="kız")||(id==="erkek"&&g==="erkek");
    btn.style.background = active ? "rgba(255,255,255,.2)" : "transparent";
    btn.style.borderColor = active ? "rgba(255,255,255,.5)" : "rgba(255,255,255,.15)";
    btn.style.color = active ? "white" : "rgba(255,255,255,.5)";
  });
}

async function doLogin(){
  const email = el("l-email")?.value.trim();
  const pw = el("l-pw")?.value;
  if(!email||!pw){ showMsg("login-msg","E-posta ve şifre girin.","err"); return; }
  el("login-btn").textContent = "Giriş yapılıyor..."; el("login-btn").disabled=true;
  const {data,error} = await sb.auth.signInWithPassword({email,password:pw});
  el("login-btn").textContent = "Giriş Yap →"; el("login-btn").disabled=false;
  if(error){ showMsg("login-msg", error.message==="Invalid login credentials"?"E-posta veya şifre hatalı.":error.message,"err"); return; }
  currentUser=data.user; await checkProfileAndRoute();
}

async function doLoginPhone(){
  const phone = el("l-phone")?.value.trim();
  if(!phone){ showMsg("login-msg","Telefon numarası girin.","err"); return; }
  const {error} = await sb.auth.signInWithOtp({phone});
  if(error){ showMsg("login-msg","SMS gönderilemedi: "+error.message,"err"); return; }
  el("otp-row").classList.remove("hidden");
  el("login-btn").textContent = "Kodu Doğrula →";
  el("login-btn").onclick = verifyOTP;
  showMsg("login-msg","SMS gönderildi! Kodu girin.","ok");
}

async function verifyOTP(){
  const phone = el("l-phone")?.value.trim();
  const token = el("l-otp")?.value.trim();
  const {data,error} = await sb.auth.verifyOtp({phone, token, type:"sms"});
  if(error){ showMsg("login-msg","Kod hatalı.","err"); return; }
  currentUser=data.user; await checkProfileAndRoute();
}

async function regStep1Next(){
  if(regMethod==="email"){
    const email=el("r-email")?.value.trim(), pw=el("r-pw")?.value;
    if(!email||!pw){ showMsg("reg-msg-1","E-posta ve şifre gerekli.","err"); return; }
    if(pw.length<6){ showMsg("reg-msg-1","Şifre en az 6 karakter olmalı.","err"); return; }
    regData.email=email; regData.pw=pw;
  } else {
    const phone=el("r-phone")?.value.trim();
    if(!phone){ showMsg("reg-msg-1","Telefon numarası gerekli.","err"); return; }
    regData.phone=phone;
    const {error}=await sb.auth.signInWithOtp({phone});
    if(error){ showMsg("reg-msg-1","SMS gönderilemedi: "+error.message,"err"); return; }
    el("reg-otp-row").classList.remove("hidden");
    showMsg("reg-msg-1","SMS gönderildi!","ok"); return;
  }
  showStep(2);
}

async function verifyRegOTP(){
  const phone=el("r-phone")?.value.trim(), token=el("r-otp")?.value.trim();
  const {data,error}=await sb.auth.verifyOtp({phone,token,type:"sms"});
  if(error){ showMsg("reg-msg-1","Kod hatalı.","err"); return; }
  currentUser=data.user; regData.phone=phone;
  showStep(2);
}

function regStep2Next(){
  const name=el("r-name")?.value.trim(), role=el("r-role")?.value;
  const ageRange=el("r-age-range")?.value, edu=el("r-edu")?.value;
  const pin=el("r-pin")?.value.trim();
  if(!name||!role||!ageRange||!edu){ showMsg("reg-msg-2","Lütfen zorunlu alanları doldurun.","err"); return; }
  if(!pin||pin.length!==4){ showMsg("reg-msg-2","Lütfen 4 haneli bir PIN belirleyin (raporları korur).","err"); return; }
  regData.full_name=name; regData.role=role; regData.age_range=ageRange;
  regData.education=edu; regData.job=el("r-job")?.value.trim()||""; regData.pin=pin;
  showStep(3);
}

async function regComplete(){
  const cname=el("r-cname")?.value.trim(), cage=el("r-cage")?.value, grade=el("r-grade")?.value;
  if(!cname||!cage||!selectedGender){ showMsg("reg-msg-3","Çocuğun adı, yaşı ve cinsiyeti gerekli.","err"); return; }
  el("reg-done-btn").textContent="Kaydediliyor..."; el("reg-done-btn").disabled=true;
  try {
    let user = currentUser;
    if(!user && regData.email){
      const {data,error}=await sb.auth.signUp({email:regData.email,password:regData.pw,options:{data:{full_name:regData.full_name}}});
      if(error) throw error;
      user=data.user;
    }
    if(!user) throw new Error("Kullanıcı oluşturulamadı.");
    await sb.from("parents").upsert({
      id:user.id, email:user.email||regData.phone,
      full_name:regData.full_name, phone:regData.phone||null,
      role:regData.role, age_range:regData.age_range,
      education:regData.education, job:regData.job, pin:regData.pin
    });
    await sb.from("children").insert({
      parent_id:user.id, name:cname, age:parseInt(cage),
      gender:selectedGender, grade:grade, language:"tr"
    });
    currentUser=user; screenChildren();
  } catch(e){
    showMsg("reg-msg-3",e.message,"err");
    el("reg-done-btn").textContent="Bibi'ye Başla! 🚀"; el("reg-done-btn").disabled=false;
  }
}

async function saveCompleteProfile(){
  const name=el("cp-name")?.value.trim(), role=el("cp-role")?.value;
  const age=el("cp-age")?.value, edu=el("cp-edu")?.value, job=el("cp-job")?.value.trim();
  const pin=el("cp-pin")?.value.trim();
  if(!name||!role||!age||!edu){ showMsg("cp-msg","Lütfen zorunlu alanları doldurun.","err"); return; }
  if(!pin||pin.length!==4){ showMsg("cp-msg","Lütfen 4 haneli bir PIN belirleyin.","err"); return; }
  const btn=document.querySelector('[onclick="saveCompleteProfile()"]');
  if(btn){ btn.textContent="Kaydediliyor..."; btn.disabled=true; }
  const {error} = await sb.from("parents").upsert({
    id:currentUser.id, email:currentUser.email||null,
    full_name:name, role, age_range:age, education:edu, job:job||"", pin
  });
  if(error){ showMsg("cp-msg","Hata: "+error.message,"err"); if(btn){btn.textContent="Kaydet ve Devam Et →";btn.disabled=false;} return; }
  screenChildren();
}

let pinTarget = null, pinEntry = "";

async function screenPinLock(child){
  if(typeof child==="string") child=JSON.parse(child);

      <div style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px">${child.name}'in gelişim raporunu görmek için PIN girin</div>

      <div id="pin-dots" style="display:flex;gap:14px;justify-content:center;margin-bottom:28px">
        ${[0,1,2,3].map(i=>`<div id="pin-dot-${i}" style="width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .15s"></div>`).join("")}
      </div>

      <div id="pin-err" style="display:none;color:#fca88a;font-size:13px;font-weight:700;margin-bottom:16px">Yanlış PIN, tekrar dene 🙈</div>

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:260px;margin:0 auto">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button onclick="pinPress('${n}')" style="aspect-ratio:1;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:white;font-size:20px;font-weight:800;cursor:pointer">${n}</button>`).join("")}
        <div></div>
        <button onclick="pinPress('0')" style="aspect-ratio:1;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:white;font-size:20px;font-weight:800;cursor:pointer">0</button>
        <button onclick="pinBackspace()" style="aspect-ratio:1;border-radius:50%;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:18px;cursor:pointer">⌫</button>
      </div>

      <button onclick="screenChildren()" style="margin-top:24px;background:transparent;border:none;color:rgba(255,255,255,.35);font-size:13px;cursor:pointer">← Vazgeç</button>
    </div>
  </div>`);
}

function pinPress(digit){
  if(pinEntry.length>=4) return;
  pinEntry += digit;
  const dot = el(`pin-dot-${pinEntry.length-1}`);
  if(dot){ dot.style.background="white"; dot.style.borderColor="white"; }
  if(pinEntry.length===4) setTimeout(checkPin, 150);
}

function pinBackspace(){
  if(pinEntry.length===0) return;
  const dot = el(`pin-dot-${pinEntry.length-1}`);
  if(dot){ dot.style.background="transparent"; dot.style.borderColor="rgba(255,255,255,.3)"; }
  pinEntry = pinEntry.slice(0,-1);
}

async function checkPin(){
  const {data:parent} = await sb.from("parents").select("pin").eq("id",currentUser.id).single();
  if(parent?.pin === pinEntry){
    screenReport(pinTarget);
  } else {
    const err = el("pin-err"); if(err) err.style.display="block";
    [0,1,2,3].forEach(i=>{ const d=el(`pin-dot-${i}`); if(d){d.style.background="transparent";d.style.borderColor="rgba(255,255,255,.3)";} });
    pinEntry = "";
    const wrap = el("pin-dots"); if(wrap){ wrap.style.animation="none"; setTimeout(()=>wrap.style.animation="",10); }
  }
}

      <button id="show-add-btn" onclick="showAddForm()" style="width:100%;padding:15px;border-radius:18px;border:2.5px dashed #b8ddd6;background:rgba(255,255,255,.7);color:#0D9B7E;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s" onmouseover="this.style.background='white'" onmouseout="this.style.background='rgba(255,255,255,.7)'">
        + Yeni Profil Ekle
      </button>
    </div>
  </div>`);
}

let newGender = "";
function selectNewGender(g){
  newGender=g;
  ["kiz","erkek"].forEach(id=>{
    const btn=el(`ng-${id}`), active=(id==="kiz"&&g==="kız")||(id==="erkek"&&g==="erkek");
    btn.style.background = active?"#e8f7f3":"white";
    btn.style.borderColor = active?"#0D9B7E":"#e0f0ec";

  });
}

function showAddForm(){ el("add-form").classList.remove("hidden"); el("show-add-btn").classList.add("hidden"); }
function hideAddForm(){ el("add-form").classList.add("hidden"); el("show-add-btn").classList.remove("hidden"); }

async function addChild(){
  const name=el("new-name")?.value.trim(), age=el("new-age")?.value, grade=el("new-grade")?.value;
  if(!name||!age||!newGender){ alert("Ad, cinsiyet ve yaş zorunlu!"); return; }
  await sb.from("children").insert({parent_id:currentUser.id,name,age:parseInt(age),gender:newGender,grade,language:"tr"});
  newGender=""; screenChildren();
}

async function deleteChild(id){
  if(!confirm("Bu profili silmek istiyor musun?"))return;
  await sb.from("children").delete().eq("id",id);
  screenChildren();
}

async function signOut(){ await sb.auth.signOut(); currentUser=null; currentChild=null; screenAuth(); }

// ══════════════════════════════════════════════════════════════
let chatExpr = "idle", mouthInterval = null;

function startChat(child){

  currentChild=child; messages=[]; sessionStart=new Date();
  const theme=getTheme(child);

  render(`

    <div style="width:100%;max-width:420px;height:100vh;display:flex;flex-direction:column;position:relative;z-index:2">

        <button onclick="goBack()" style="position:absolute;top:14px;left:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button onclick="toggleVoice()" id="voice-btn" style="position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.3);cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <div id="bibi-face-wrap" style="position:relative">${bibiFaceSVG("idle",110)}</div>
        <div style="text-align:center">
          <div style="color:white;font-size:19px;font-weight:900">bibi</div>
          <div style="color:rgba(255,255,255,.65);font-size:11px;margin-top:2px">${child.name} ile konuşuyor</div>
          <div style="display:flex;align-items:center;gap:5px;justify-content:center;margin-top:4px">
            <span id="status-dot" style="width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;transition:background .3s"></span>
            <span id="status-text" style="color:rgba(255,255,255,.6);font-size:11px;font-weight:600">Seninle burada!</span>
          </div>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages" style="flex:1;overflow-y:auto;padding:16px 16px 8px;display:flex;flex-direction:column;background:rgba(255,255,255,.04);backdrop-filter:blur(8px)"></div>

      <!-- Quick prompts -->
      <div id="quick-prompts" style="padding:6px 16px 6px;display:flex;gap:6px;flex-wrap:wrap;background:rgba(255,255,255,.04)">
        <button class="chip" onclick="setInput('Matematik ödev yardımı 📐')">Matematik ödev 📐</button>
        <button class="chip" onclick="setInput('Neden gökyüzü mavi? 🌤️')">Gökyüzü neden mavi? 🌤️</button>
        <button class="chip" onclick="setInput('Hikaye anlat 📖')">Hikaye anlat 📖</button>
        <button class="chip" onclick="setInput('Yeni kelime öğret 🔤')">Kelime öğret 🔤</button>
      </div>

      <!-- Input bar -->
      <div style="padding:10px 14px 14px;border-top:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.08);backdrop-filter:blur(12px);flex-shrink:0">
        <div id="mic-err" style="display:none;background:rgba(244,132,95,.15);border:1px solid rgba(244,132,95,.3);border-radius:10px;padding:7px 12px;font-size:12px;color:#fca88a;font-weight:600;margin-bottom:8px;text-align:center"></div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="mic-btn" onclick="toggleMic()" style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="11" rx="3" fill="white"/><path d="M5 11a7 7 0 0 0 14 0" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="9" y1="22" x2="15" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
          <input id="chat-input" placeholder="Bibi'ye yaz veya konuş..." onkeydown="if(event.key==='Enter')sendMessage()" style="flex:1;padding:12px 16px;border-radius:24px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.12);font-size:15px;color:white;backdrop-filter:blur(8px)"/>
          <button id="send-btn" onclick="sendMessage()" style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.25);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>

  // Start session & first message
  sb.from("sessions").insert({child_id:child.id,started_at:new Date().toISOString()}).select().single().then(({data})=>{ if(data) sessionId=data.id; });
  addMsg("bibi", `Merhaba ${child.name}! 👋 Ben Bibi — seninle öğrenmek için buradayım. Bugün ne hakkında konuşmak istersin? 🌟`);
}

function setExpr(expr){
  chatExpr=expr;
  const wrap=el("bibi-face-wrap");
  if(wrap) wrap.innerHTML=bibiFaceSVG(expr,110);
}

function setStatus(text,color){
  const d=el("status-dot"),t=el("status-text");
  if(d) d.style.background=color;
  if(t) t.textContent=text;
}

function addMsg(role, text){
  messages.push({r:role,t:text});
  const msgsEl=el("messages"); if(!msgsEl) return;
  const theme=getTheme(currentChild);
  const row=document.createElement("div");
  row.className=`msg-row ${role}`;
  const bubble=document.createElement("div");
  bubble.className=role==="bibi"?"msg-bibi":"msg-user";
  if(role==="user") bubble.style.background=theme.bubble;
  bubble.textContent=text;
  row.appendChild(bubble);
  if(role==="bibi"){
    const btn=document.createElement("button");
    btn.style.cssText="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7";
    btn.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="white"/></svg>';
    btn.onclick=()=>speak(text);
    row.appendChild(btn);
  }
  msgsEl.appendChild(row);
  msgsEl.scrollTop=msgsEl.scrollHeight;
  if(messages.length>2){ const qp=el("quick-prompts"); if(qp) qp.style.display="none"; }
}

function addTyping(){
  const msgsEl=el("messages"); if(!msgsEl) return;
  const row=document.createElement("div");
  row.id="typing-row"; row.className="msg-row bibi";
  row.innerHTML='<div class="msg-bibi" style="display:flex;gap:5px;align-items:center;padding:14px 18px"><span style="width:8px;height:8px;border-radius:50%;background:#0D9B7E;animation:dotPulse 1.2s ease infinite"></span><span style="width:8px;height:8px;border-radius:50%;background:#0D9B7E;animation:dotPulse 1.2s ease .2s infinite"></span><span style="width:8px;height:8px;border-radius:50%;background:#0D9B7E;animation:dotPulse 1.2s ease .4s infinite"></span></div>';
  msgsEl.appendChild(row); msgsEl.scrollTop=msgsEl.scrollHeight;
}

function removeTyping(){ const t=el("typing-row"); if(t) t.remove(); }
function setInput(v){ const i=el("chat-input"); if(i) i.value=v; }

async function sendMessage(){
  const inp=el("chat-input"); if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value="";
  addMsg("user",text);
  setExpr("thinking"); setStatus("Düşünüyor...","#fbbf24");
  addTyping();
  const topic = detectTopic(text);
  const homeworkMode = isHomeworkQuestion(text);
  if(sessionId) sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"user",content:text,topic,language:"tr"});
  updateMastery(currentChild.id, topic);
  try{
    const res=await fetch(OPENROUTER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${OPENROUTER_KEY}`,"HTTP-Referer":"https://bibi-app-rho.vercel.app","X-Title":"Bibi"},
      body:JSON.stringify({model:"openrouter/auto",messages:[{role:"system",content:buildPrompt(currentChild)},...messages.map(m=>({role:m.r==="bibi"?"assistant":"user",content:m.t}))],max_tokens:1000})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||data.error?.message||"Bir sorun oluştu 🙈";
    removeTyping();
    setExpr("happy"); setStatus("Seninle burada!","#4ade80");
    addMsg("bibi",reply);
    speak(reply);
    setTimeout(()=>setExpr("idle"),3000);
    if(sessionId) sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"assistant",content:reply,language:"tr"});
  }catch(e){
    removeTyping(); setExpr("idle");
    addMsg("bibi","Bağlantıda sorun var 😅 Tekrar dener misin?");
    setStatus("Seninle burada!","#4ade80");
  }
}

async function goBack(){
  if(sessionId){
    const mins=Math.round((new Date()-sessionStart)/60000);
    await sb.from("sessions").update({ended_at:new Date().toISOString(),duration_mins:mins,message_count:messages.filter(m=>m.r==="user").length}).eq("id",sessionId);
  }
  sessionId=null; screenChildren();
}

// ── VOICE ─────────────────────────────────────────────────────
function speak(text){
  if(!voiceOn||!window.speechSynthesis) return;
  const clean=text.replace(/[\u{1F000}-\u{1FFFF}]/gu,"").trim();
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang="tr-TR"; u.rate=0.9; u.pitch=1.2;
  const vs=window.speechSynthesis.getVoices();
  const tv=vs.find(v=>v.lang.startsWith("tr")); if(tv) u.voice=tv;
  u.onstart=()=>{setExpr("talking"); setStatus("Konuşuyor...","#a78bfa");};
  u.onend=()=>{setExpr("idle"); setStatus("Seninle burada!","#4ade80");};
  window.speechSynthesis.speak(u);
}

function toggleVoice(){
  voiceOn=!voiceOn;
  const btn=el("voice-btn");
  if(btn) btn.style.background=voiceOn?"rgba(255,255,255,.2)":"rgba(0,0,0,.3)";
  if(!voiceOn) window.speechSynthesis?.cancel();
}

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ const e=el("mic-err"); if(e){e.textContent="Chrome kullan! 🎙️";e.style.display="block";setTimeout(()=>e.style.display="none",3000);} return; }
  if(isListening){ recognition?.stop(); return; }
  recognition=new SR(); recognition.lang="tr-TR"; recognition.continuous=false; recognition.interimResults=true;
  recognition.onstart=()=>{ isListening=true; setExpr("listening"); setStatus("Seni dinliyorum 🎙️","#F4845F"); const btn=el("mic-btn"); if(btn) btn.style.background="#F4845F"; };
  recognition.onresult=e=>{ let t=""; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; const inp=el("chat-input"); if(inp) inp.value=t; };
  recognition.onend=()=>{ isListening=false; setExpr("idle"); setStatus("Seninle burada!","#4ade80"); const btn=el("mic-btn"); if(btn) btn.style.background="rgba(255,255,255,.15)"; };
  recognition.onerror=e=>{ isListening=false; const err=el("mic-err"); if(err){err.textContent=e.error==="not-allowed"?"Mikrofon izni gerekli!":"Ses duyamadım 🎤";err.style.display="block";setTimeout(()=>err.style.display="none",3000);} };
  recognition.start();
}

window.onload = async () => {
  screenLoading();
  const t=setTimeout(()=>screenAuth(),5000);
  try {
    const {data:{session}}=await sb.auth.getSession();
    clearTimeout(t);
    if(session?.user){ currentUser=session.user; screenChildren(); }
    else screenAuth();
  } catch(e){ clearTimeout(t); screenAuth(); }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session?.user){ currentUser=session.user; if(!currentChild) checkProfileAndRoute(); }
    else{ currentUser=null; screenAuth(); }
  });
};
