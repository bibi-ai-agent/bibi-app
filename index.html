function floatingBibis(count=6, colors=["#0D9B7E"]){
  const anims = ["floatBibi","floatBibi2","floatBibi3"];
  let html = "";
  for(let i=0;i<count;i++){
    const size = 60 + Math.random()*80;
    const x = Math.random()*90;
    const y = Math.random()*90;
    const anim = anims[i%3];
    const dur = 4 + Math.random()*4;
    const delay = Math.random()*3;
    const color = colors[i%colors.length];
    html += `<div class="bg-bibi" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;animation:${anim} ${dur}s ${delay}s ease-in-out infinite">${bgBibiSVG(size,color)}</div>`;
  }
  return html;
}

function getAgeGroup(age){
  if(!age || age<=8) return "young";
  if(age<=12) return "middle";
  return "teen";
}

function floatingBubbles(children=[]){
  // Get all unique age groups from children
  const groups = children.length > 0 
    ? [...new Set(children.map(c=>getAgeGroup(c.age)))]
    : ["young","middle"];
  
  // Mix content from all children's age groups
  let allQ = [], allC = [];
  groups.forEach(g=>{
    allQ.push(...BUBBLE_CONTENT[g].questions);
    allC.push(...BUBBLE_CONTENT[g].chat);
  });
  
  // Shuffle
  const shuffle = arr => arr.sort(()=>Math.random()-.5);
  allQ = shuffle(allQ).slice(0,8);
  allC = shuffle(allC).slice(0,7);
  
  const anims = ["floatBibi","floatBibi2","floatBibi3"];
  const positions = [
    {x:2,y:5},{x:65,y:3},{x:80,y:15},{x:5,y:25},{x:70,y:28},
    {x:15,y:45},{x:75,y:42},{x:3,y:60},{x:60,y:58},{x:85,y:60},
    {x:10,y:75},{x:55,y:72},{x:80,y:78},{x:20,y:88},{x:65,y:88}
  ];
  
  let html = "";
  const allBubbles = [
    ...allQ.map(t=>({text:t,type:"question"})),
    ...allC.map(t=>({text:t,type:"chat"}))
  ];
  shuffle(allBubbles);
  
  allBubbles.slice(0,15).forEach((b,i)=>{
    const pos = positions[i%positions.length];
    const anim = anims[i%3];
    const dur = 5+Math.random()*5;
    const delay = Math.random()*4;
    const isQ = b.type==="question";
    const bg = isQ ? "rgba(13,155,126,0.12)" : "rgba(255,255,255,0.10)";
    const border = isQ ? "1.5px solid rgba(13,155,126,0.25)" : "1.5px solid rgba(255,255,255,0.18)";
    const textColor = isQ ? "rgba(13,155,126,0.7)" : "rgba(255,255,255,0.55)";
    html += `<div style="position:absolute;left:${pos.x}%;top:${pos.y}%;background:${bg};border:${border};border-radius:20px;padding:8px 14px;font-size:12px;font-weight:700;color:${textColor};white-space:nowrap;animation:${anim} ${dur}s ${delay}s ease-in-out infinite;pointer-events:none;max-width:200px;backdrop-filter:blur(4px)">${b.text}</div>`;
  });
  return html;
}

const TOPICS = {
  "Matematik":["matematik","sayı","toplama","çıkarma","çarpma","bölme","kesir","geometri","denklem","yüzde"],
  "Fen":["fen","fizik","kimya","biyoloji","deney","atom","hücre","enerji","kuvvet","gezegen"],
  "Dil":["türkçe","kelime","cümle","hikaye","şiir","okuma","dilbilgisi","ingilizce","dil"],
  "Tarih":["tarih","osmanlı","atatürk","savaş","medeniyet","cumhuriyet"],
};
function detectTopic(t){
  const l=t.toLowerCase();
  for(const[k,v]of Object.entries(TOPICS)) if(v.some(w=>l.includes(w))) return k;
  return "Genel";
}

const HOMEWORK_SIGNALS = ["ödev","nasıl çözülür","nasıl yapılır","cevap nedir","sonuç ne","bul","hesapla","çöz"];
function isHomeworkQuestion(t){
  const l=t.toLowerCase();
  return HOMEWORK_SIGNALS.some(w=>l.includes(w));
}

// Ustalık skoru — her konuda mesaj attıkça yavaşça artar (basit, kademeli model)
async function updateMastery(childId, topic){
  if(topic==="Genel") return;
  try{
    const {data:existing} = await sb.from("mastery").select("*").eq("child_id",childId).eq("topic",topic).single();
    if(existing){
      const newScore = Math.min(100, existing.score + 2);
      await sb.from("mastery").update({score:newScore, message_count:existing.message_count+1, updated_at:new Date().toISOString()}).eq("id",existing.id);
    } else {
      await sb.from("mastery").insert({child_id:childId, topic, score:8, message_count:1});
    }
  }catch(e){
    // mastery tablosu yoksa veya satır bulunamazsa sessizce devam et
    await sb.from("mastery").insert({child_id:childId, topic, score:8, message_count:1}).then(()=>{}).catch(()=>{});
  }
}

    bg:"linear-gradient(135deg,#2d1b3d 0%,#1a1040 50%,#2d0f2d 100%)",
    header:"linear-gradient(135deg,#b5449a,#7c2d8e)",
    bubble:"#b5449a", colors:["#e879c8","#a855f7","#ec4899"],

    bubble:"#7c3aed", colors:["#a78bfa","#c084fc","#e879c8"],
    stars:true
  };
  if(!isGirl && isYoung) return {
    bg:"linear-gradient(135deg,#0c2340 0%,#1a3a5c 100%)",
    header:"linear-gradient(135deg,#2563eb,#1d4ed8)",

let regMethod = "email", loginMethodCurrent = "email", selectedGender = "";

function switchAuthMode(mode){
  authMode = mode;
  el("tab-login").style.background = mode==="login" ? "#0D9B7E" : "transparent";
  el("tab-login").style.color = mode==="login" ? "white" : "rgba(255,255,255,.45)";
  el("tab-reg").style.background = mode==="register" ? "#0D9B7E" : "transparent";
  el("tab-reg").style.color = mode==="register" ? "white" : "rgba(255,255,255,.45)";
  el("login-form").classList.toggle("hidden", mode!=="login");
  showStep(mode==="register" ? 1 : 0);
}

function showStep(step){
  [1,2,3].forEach(s => {
    const e = el(`reg-form-${s}`);
    if(e){ e.classList.toggle("hidden", s!==step); }
  });
}

function switchMethod(m){
  loginMethodCurrent = m;
  el("m-email").style.background = m==="email" ? "rgba(255,255,255,.15)" : "transparent";
  el("m-email").style.borderColor = m==="email" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("m-email").style.color = m==="email" ? "white" : "rgba(255,255,255,.45)";
  el("m-phone").style.background = m==="phone" ? "rgba(255,255,255,.15)" : "transparent";
  el("m-phone").style.borderColor = m==="phone" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("m-phone").style.color = m==="phone" ? "white" : "rgba(255,255,255,.45)";
  el("login-email-fields").classList.toggle("hidden", m!=="email");
  el("login-phone-fields").classList.toggle("hidden", m!=="phone");
  el("login-btn").textContent = m==="phone" ? "Kod Gönder →" : "Giriş Yap →";
  el("login-btn").onclick = m==="phone" ? doLoginPhone : doLogin;
}

function switchRegMethod(m){
  regMethod = m;
  el("rm-email").style.background = m==="email" ? "rgba(255,255,255,.15)" : "transparent";
  el("rm-email").style.borderColor = m==="email" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("rm-email").style.color = m==="email" ? "white" : "rgba(255,255,255,.45)";
  el("rm-phone").style.background = m==="phone" ? "rgba(255,255,255,.15)" : "transparent";
  el("rm-phone").style.borderColor = m==="phone" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("rm-phone").style.color = m==="phone" ? "white" : "rgba(255,255,255,.45)";
  el("reg-email-fields").classList.toggle("hidden", m!=="email");
  el("reg-phone-fields").classList.toggle("hidden", m!=="phone");
}

function selectGender(g){
  selectedGender = g;
  ["kiz","erkek"].forEach(id => {
    const btn = el(`g-${id}`);
    const active = (id==="kiz"&&g==="kız")||(id==="erkek"&&g==="erkek");
    btn.style.background = active ? "rgba(255,255,255,.2)" : "transparent";
    btn.style.borderColor = active ? "rgba(255,255,255,.5)" : "rgba(255,255,255,.15)";
    btn.style.color = active ? "white" : "rgba(255,255,255,.5)";
  });
}

async function doLogin(){
  const email = el("l-email")?.value.trim();

async function regComplete(){

  el("reg-done-btn").textContent="Kaydediliyor..."; el("reg-done-btn").disabled=true;
  try {

    if(!user && regData.email){
      const {data,error}=await sb.auth.signUp({email:regData.email,password:regData.pw,options:{data:{full_name:regData.full_name}}});
      if(error) throw error;
      user=data.user;
    }
    if(!user) throw new Error("Kullanıcı oluşturulamadı.");
    await sb.from("parents").upsert({
      id:user.id, email:user.email||regData.phone,

      education:regData.education, job:regData.job, pin:regData.pin

      gender:selectedGender, grade:grade, language:"tr"
    });

function setPinPress(digit){
  const current = setPinStep===1 ? setPinEntry : setPinConfirm;
  if(current.length>=4) return;
  const newVal = current + digit;
  if(setPinStep===1) setPinEntry=newVal; else setPinConfirm=newVal;
  const dot = document.getElementById(`setpin-dot-${newVal.length-1}`);
  if(dot){ dot.style.background="white"; dot.style.borderColor="white"; }
  if(newVal.length===4) setTimeout(setPinNext, 150);
}

function setPinBackspace(){
  const current = setPinStep===1 ? setPinEntry : setPinConfirm;
  if(current.length===0) return;
  const dot = document.getElementById(`setpin-dot-${current.length-1}`);
  if(dot){ dot.style.background="transparent"; dot.style.borderColor="rgba(255,255,255,.3)"; }
  if(setPinStep===1) setPinEntry=setPinEntry.slice(0,-1);
  else setPinConfirm=setPinConfirm.slice(0,-1);
}

async function setPinNext(){
  if(setPinStep===1){
    // Adım 2: onay
    setPinStep=2; setPinConfirm="";
    renderSetPin();
  } else {
    // Onayla
    if(setPinEntry !== setPinConfirm){
      const err=document.getElementById("setpin-err"); if(err) err.style.display="block";
      [0,1,2,3].forEach(i=>{ const d=document.getElementById(`setpin-dot-${i}`); if(d){d.style.background="transparent";d.style.borderColor="rgba(255,255,255,.3)";} });
      setPinConfirm=""; setPinStep=1; setPinEntry="";
      setTimeout(renderSetPin, 800); return;
    }
    // Kaydet
    await sb.from("parents").update({pin:setPinEntry}).eq("id",currentUser.id);
    // Artık PIN ekranına yönlendir
    screenPinLock(setPinTarget);
  }
}

let newGender = "", newAvatarData = "", newAvatarType = ""; // type: "emoji" | "photo" | ""

function selectEmoji(emoji){
  newAvatarData = emoji;
  newAvatarType = "emoji";
  // Önizleme güncelle
  const inner = document.getElementById("avatar-preview-inner");
  const preview = document.getElementById("avatar-preview");
  if(inner) inner.innerHTML = `<span style="font-size:36px">${emoji}</span>`;
  if(preview) preview.style.border = "2.5px solid #0D9B7E";
  // Seçilen emoji butonunu vurgula
  document.querySelectorAll(".emoji-av").forEach(btn=>{
    btn.style.borderColor = btn.textContent===emoji ? "#0D9B7E" : "#e0f0ec";
    btn.style.background = btn.textContent===emoji ? "#e8f7f3" : "#f9fafb";
    btn.style.transform = btn.textContent===emoji ? "scale(1.2)" : "scale(1)";
  });
}

function handleAvatarUpload(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ alert("Fotoğraf 2MB'dan küçük olmalı."); return; }
  const reader = new FileReader();
  reader.onload = e => {
    newAvatarData = e.target.result; // base64
    newAvatarType = "photo";
    const inner = document.getElementById("avatar-preview-inner");
    const preview = document.getElementById("avatar-preview");
    if(inner) inner.innerHTML = `<img src="${newAvatarData}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    if(preview){ preview.style.border = "2.5px solid #0D9B7E"; preview.style.padding="0"; }
    // Emoji seçimlerini temizle
    document.querySelectorAll(".emoji-av").forEach(btn=>{ btn.style.borderColor="#e0f0ec"; btn.style.background="#f9fafb"; btn.style.transform="scale(1)"; });
  };
  reader.readAsDataURL(file);
}

function selectNewGender(g){
  newGender=g;
  ["kiz","erkek"].forEach(id=>{
    const btn=el(`ng-${id}`), active=(id==="kiz"&&g==="kız")||(id==="erkek"&&g==="erkek");
    btn.style.background = active?"#e8f7f3":"white";
    btn.style.borderColor = active?"#0D9B7E":"#e0f0ec";
    btn.style.color = active?"#0D9B7E":"#6B7280";
  });
}

async function saveAvatarEmoji(emoji, childId){
  await sb.from("children").update({avatar_emoji:emoji, avatar_photo:null}).eq("id",childId);
  closeAvatarModal();
  screenChildren();
}

async function saveAvatarPhoto(input, childId){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024){ alert("Fotoğraf 2MB'dan küçük olmalı."); return; }
  const reader = new FileReader();
  reader.onload = async e => {
    await sb.from("children").update({avatar_photo:e.target.result, avatar_emoji:null}).eq("id",childId);
    closeAvatarModal();
    screenChildren();
  };
  reader.readAsDataURL(file);
}

async function addChild(){
  const name=el("new-name")?.value.trim(), age=el("new-age")?.value, grade=el("new-grade")?.value;
  if(!name||!age||!newGender){ alert("Ad, cinsiyet ve yaş zorunlu!"); return; }
  const avatarCol = newAvatarType==="photo" ? "avatar_photo" : newAvatarType==="emoji" ? "avatar_emoji" : null;
  const insertData = {parent_id:currentUser.id, name, age:parseInt(age), gender:newGender, grade, language:"tr"};
  if(newAvatarType==="emoji") insertData.avatar_emoji = newAvatarData;
  if(newAvatarType==="photo") insertData.avatar_photo = newAvatarData;
  await sb.from("children").insert(insertData);
  newGender=""; newAvatarData=""; newAvatarType="";
  screenChildren();
}

async function sendMessage(){
  const inp=el("chat-input"); if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value="";
  addMsg("user",text);
  setExpr("thinking"); setStatus("Düşünüyor...","#fbbf24");
  addTyping();
  const topic = detectTopic(text);
  const homeworkMode = isHomeworkQuestion(text);
  if(sessionId){
    const {error:mErr} = await sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"user",content:text,topic,language:"tr"});
    if(mErr) console.error("Mesaj kayıt hatası:", JSON.stringify(mErr));
  } else {
    console.warn("sessionId yok, mesaj kaydedilemiyor");
  }
  updateMastery(currentChild.id, topic);
  try{
    const res=await fetch(OPENROUTER_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${OPENROUTER_KEY}`,"HTTP-Referer":"https://bibi-app-rho.vercel.app","X-Title":"Bibi"},
      body:JSON.stringify({model:"openrouter/auto",messages:[{role:"system",content:buildPrompt(currentChild)},...messages.map(m=>({role:m.r==="bibi"?"assistant":"user",content:m.t}))],max_tokens:1000})
    });
    const data=await res.json();
    const reply=data.choices?.[0]?.message?.content||data.error?.message||"Bir sorun oluştu 🙈";
    removeTyping();
    setExpr("happy"); setStatus("Seninle burada!","#4ade80");
    const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("happy",44);
    addMsg("bibi",reply);
    speak(reply);
    setTimeout(()=>{ setExpr("idle"); const w=el("bibi-face-wrap"); if(w) w.innerHTML=bibiFaceSVG("idle",44); },3000);
    if(sessionId){
      const {error:aErr} = await sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"assistant",content:reply,language:"tr"});
      if(aErr) console.error("Asistan mesaj hatası:", JSON.stringify(aErr));
    }
  }catch(e){
    removeTyping(); setExpr("idle");
    addMsg("bibi","Bağlantıda sorun var 😅 Tekrar dener misin?");
    setStatus("Seninle burada!","#4ade80");
  }
}

let historyOpen = false;

function toggleHistory(){
  historyOpen = !historyOpen;
  const panel = el("history-panel");
  const backdrop = el("history-backdrop");
  if(!panel||!backdrop) return;
  panel.style.left = historyOpen ? "0" : "-110%";
  backdrop.style.display = historyOpen ? "block" : "none";
  if(historyOpen) loadHistory();
}

async function loadHistory(){
  const listEl = el("history-list");
  if(!listEl) return;
  listEl.innerHTML=`<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:30px 0">Yükleniyor...</div>`;

  // Son 20 oturumu çek
  const {data:sessions} = await sb.from("sessions")
    .select("id,started_at,duration_mins,message_count")
    .eq("child_id", currentChild.id)
    .order("started_at",{ascending:false})
    .limit(20);

  if(!sessions||sessions.length===0){
    listEl.innerHTML=`<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:40px 16px">Henüz sohbet geçmişi yok.<br/>Bibi ile konuştukça burada görünür 💬</div>`;
    return;
  }

  // Her oturum için ilk kullanıcı mesajını AYRI AYRI çek
  const sessionTitles = {};
  for(const s of sessions){
    const {data:firstMsg} = await sb.from("messages")
      .select("content")
      .eq("session_id", s.id)
      .eq("role","user")
      .order("created_at",{ascending:true})
      .limit(1)
      .single();
    sessionTitles[s.id] = firstMsg?.content || null;
  }

  listEl.innerHTML = sessions.map((s,i)=>{
    const raw = sessionTitles[s.id];
    const title = raw
      ? (raw.length>48 ? raw.slice(0,48)+"..." : raw)
      : `Sohbet ${sessions.length - i}`;
    const date = new Date(s.started_at);
    const dateStr = date.toLocaleDateString("tr-TR",{day:"numeric",month:"short"});
    const timeStr = date.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
    const isActive = s.id === sessionId;
    return `
    <div onclick="loadSession('${s.id}')"
      style="padding:12px 10px;border-radius:12px;margin-bottom:8px;cursor:pointer;
        background:${isActive?"rgba(13,155,126,.2)":"rgba(255,255,255,.05)"};
        border:1px solid ${isActive?"rgba(13,155,126,.4)":"rgba(255,255,255,.08)"};
        transition:background .2s"
      onmouseover="this.style.background='rgba(255,255,255,.1)'"
      onmouseout="this.style.background='${isActive?"rgba(13,155,126,.2)":"rgba(255,255,255,.05)"}'">
      <div style="color:white;font-size:13px;font-weight:700;line-height:1.45;margin-bottom:5px">${title}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="color:rgba(255,255,255,.35);font-size:11px">${dateStr} ${timeStr}</span>
        ${s.duration_mins ? `<span style="color:#4ade80;font-size:11px;font-weight:600">${s.duration_mins} dk</span>` : ""}
        ${s.message_count ? `<span style="color:rgba(255,255,255,.3);font-size:11px">${s.message_count} mesaj</span>` : ""}
      </div>
    </div>`;
  }).join("");
}

async function loadSession(sid){
  toggleHistory();

  // Seçilen oturumun mesajlarını çek
  const {data:oldMsgs, error} = await sb.from("messages")
    .select("role,content,created_at")
    .eq("session_id", sid)
    .order("created_at",{ascending:true});

  if(error || !oldMsgs || oldMsgs.length===0){
    // Mesaj yoksa uyar
    const msgsEl=el("messages");
    if(msgsEl){
      msgsEl.innerHTML=`<div style="text-align:center;color:rgba(255,255,255,.4);font-size:13px;padding:40px 20px">Bu sohbette mesaj bulunamadı.</div>`;
    }
    return;
  }

  // Mevcut aktif oturumu kapat
  if(sessionId && sessionId !== sid){
    const mins=Math.round((new Date()-sessionStart)/60000);
    await sb.from("sessions").update({
      ended_at:new Date().toISOString(),
      duration_mins:mins,
      message_count:messages.filter(m=>m.r==="user").length
    }).eq("id",sessionId);
  }

  // Mesajları ekranda göster
  messages=[];
  const msgsEl=el("messages");
  if(msgsEl) msgsEl.innerHTML="";
  const qp=el("quick-prompts"); if(qp) qp.style.display="none";

  oldMsgs.forEach(m=>{
    addMsg(m.role==="user"?"user":"bibi", m.content);
  });

  sessionId = sid;
  sessionStart = new Date();
}

function newChat(){
  toggleHistory();
  sessionId = null;
  messages = [];
  const msgsEl = el("messages");
  if(msgsEl) msgsEl.innerHTML="";
  const qp=el("quick-prompts"); if(qp) qp.style.display="flex";

  // Yeni oturum başlat
  sb.from("sessions").insert({child_id:currentChild.id,started_at:new Date().toISOString()}).select().single().then(({data})=>{if(data) sessionId=data.id;});

  const openMsg = currentChild.age<=8
    ? `Heyyyy ${currentChild.name}! Bugün ne öğrenmek istersin? 🎉`
    : currentChild.age<=12
    ? `Merhaba ${currentChild.name}! Yeni bir sohbet başlayalım mı?`
    : `Selam ${currentChild.name}. Ne konuşacağız?`;
  addMsg("bibi", openMsg);
  sessionStart = new Date();
}

let backPinEntry = "";

function backPinPress(digit){
  if(backPinEntry.length>=4) return;
  backPinEntry += digit;
  const dot = document.getElementById(`bpd-${backPinEntry.length-1}`);
  if(dot){ dot.style.background="white"; dot.style.borderColor="white"; }
  if(backPinEntry.length===4) setTimeout(checkBackPin, 150);
}

function backPinBackspace(){
  if(backPinEntry.length===0) return;
  const dot = document.getElementById(`bpd-${backPinEntry.length-1}`);
  if(dot){ dot.style.background="transparent"; dot.style.borderColor="rgba(255,255,255,.3)"; }
  backPinEntry = backPinEntry.slice(0,-1);
}

async function checkBackPin(){
  const {data:parent} = await sb.from("parents").select("pin").eq("id",currentUser.id).single();
  if(parent?.pin === backPinEntry){
    closeBackPin();
    goBack();
  } else {
    const err = document.getElementById("back-pin-err");
    if(err) err.style.display = "block";
    [0,1,2,3].forEach(i=>{
      const d = document.getElementById(`bpd-${i}`);
      if(d){ d.style.background="transparent"; d.style.borderColor="rgba(255,255,255,.3)"; }
    });
    backPinEntry = "";
  }
}

function closeBackPin(){
  const overlay = document.getElementById("back-pin-overlay");
  if(overlay) overlay.remove();
  backPinEntry = "";
}

async function goBack(){
  if(sessionId){
    const mins=Math.round((new Date()-sessionStart)/60000);
    await sb.from("sessions").update({ended_at:new Date().toISOString(),duration_mins:mins,message_count:messages.filter(m=>m.r==="user").length}).eq("id",sessionId);
  }
  sessionId=null; screenChildren();
}

// ── VOICE ─────────────────────────────────────────────────────
// ── Ses sistemi — durdur/devam et desteği ────────────────────
let speechSentences = [];
let speechIndex = 0;
let speechPaused = false;
let speechActive = false;
let currentUtterance = null;

function cleanText(text){
  return text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,"")
    .replace(/[\u{2600}-\u{27BF}]/gu,"")
    .replace(/[\u{1F300}-\u{1F9FF}]/gu,"")
    .replace(/[\u2702-\u27B0]/gu,"")
    .replace(/[★☆♥♦♣♠•◦▪▫►◄▲▼]/g,"")
    .replace(/━+/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function getVoiceSettings(){
  const age = currentChild?.age || 9;
  if(age <= 8)  return {rate:0.82, pitch:1.45, volume:1.0};
  if(age <= 12) return {rate:0.88, pitch:1.20, volume:1.0};
  return                {rate:0.92, pitch:1.05, volume:1.0};
}

function getTRVoice(){
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v=>v.lang.startsWith("tr")&&v.name.toLowerCase().includes("female"))
    || voices.find(v=>v.lang.startsWith("tr")&&(v.name.includes("Filiz")||v.name.includes("Yelda")))
    || voices.find(v=>v.lang.startsWith("tr"))
    || null;
}

function speakFromIndex(index){
  if(index >= speechSentences.length){
    speechActive = false;
    speechPaused = false;
    speechIndex = 0;
    setExpr("idle");
    setStatus(`${currentChild?.name||""} ile`,"#4ade80");
    const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("idle",44);
    updateVoiceBtn();
    return;
  }

  const sentence = speechSentences[index]?.trim();
  if(!sentence){ speakFromIndex(index+1); return; }

  const u = new SpeechSynthesisUtterance(sentence);
  currentUtterance = u;
  u.lang = "tr-TR";
  const vs = getVoiceSettings();
  u.rate = vs.rate; u.pitch = vs.pitch; u.volume = vs.volume;
  const tv = getTRVoice(); if(tv) u.voice = tv;

  u.onstart = () => {
    speechIndex = index;
    speechActive = true;
    setExpr("talking");
    setStatus("Konuşuyor...","#a78bfa");
    const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("talking",44);
    updateVoiceBtn();
  };

  u.onend = () => {
    currentUtterance = null;
    if(!speechPaused){
      speakFromIndex(index + 1);
    }
  };

  u.onerror = (e) => {
    currentUtterance = null;
    if(e.error !== "interrupted" && !speechPaused){
      speakFromIndex(index + 1);
    }
  };

  window.speechSynthesis.speak(u);
}

function speak(text){
  if(!window.speechSynthesis) return;

  // Öncekini durdur
  window.speechSynthesis.cancel();
  currentUtterance = null;
  speechPaused = false;
  speechActive = false;

  const clean = cleanText(text);
  if(!clean) return;

  // Cümlelere böl
  speechSentences = clean.split(/(?<=[.!?])\s+/).filter(s=>s.trim().length > 0);
  if(speechSentences.length === 0) speechSentences = [clean];
  speechIndex = 0;

  // Küçük gecikme — cancel'in bitmesini bekle
  setTimeout(() => speakFromIndex(0), 100);
}

function pauseSpeech(){
  if(!speechActive || speechPaused) return;
  speechPaused = true;
  speechActive = false;
  window.speechSynthesis.cancel(); // Chrome'da pause çalışmıyor, cancel kullan
  currentUtterance = null;
  // speechIndex zaten doğru cümlede — cancel sonrası o cümleden başlayacak
  setExpr("idle");
  setStatus("Duraklatıldı ⏸","#fbbf24");
  const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("idle",44);
  updateVoiceBtn();
}

function resumeSpeech(){
  if(!speechPaused) return;
  speechPaused = false;
  setTimeout(() => speakFromIndex(speechIndex), 100);
}

function toggleVoice(){
  if(speechActive && !speechPaused){
    pauseSpeech();
  } else if(speechPaused){
    resumeSpeech();
  } else {
    voiceOn = !voiceOn;
    if(!voiceOn){ window.speechSynthesis.cancel(); speechActive=false; speechPaused=false; }
    updateVoiceBtn();
  }
}

function updateVoiceBtn(){
  const btn = el("voice-btn");
  if(!btn) return;
  if(speechActive && !speechPaused){
    btn.style.background = "rgba(167,139,250,.35)";
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="6" y="4" width="4" height="16" rx="1" fill="white"/><rect x="14" y="4" width="4" height="16" rx="1" fill="white"/></svg>`;
    btn.title = "Durdur";
  } else if(speechPaused){
    btn.style.background = "rgba(251,191,36,.35)";
    btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="white"/></svg>`;
    btn.title = "Devam et";
  } else {
    btn.style.background = voiceOn ? "rgba(255,255,255,.2)" : "rgba(0,0,0,.3)";
    btn.innerHTML = voiceOn
      ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`
      : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="rgba(255,255,255,.4)"/><line x1="23" y1="9" x2="17" y2="15" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="9" x2="23" y2="15" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-linecap="round"/></svg>`;
    btn.title = voiceOn ? "Sesi kapat" : "Sesi aç";
  }
}

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ const e=el("mic-err"); if(e){e.textContent="Chrome kullan! 🎙️";e.style.display="block";setTimeout(()=>e.style.display="none",3000);} return; }
  if(isListening){ recognition?.stop(); return; }
  recognition=new SR(); recognition.lang="tr-TR"; recognition.continuous=false; recognition.interimResults=true;
  recognition.onstart=()=>{ isListening=true; setExpr("listening"); setStatus("Seni dinliyorum 🎙️","#F4845F"); const btn=el("mic-btn"); if(btn) btn.style.background="#F4845F"; };
  recognition.onresult=e=>{ let t=""; for(let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript; const inp=el("chat-input"); if(inp) inp.value=t; };
  recognition.onend=()=>{ isListening=false; setExpr("idle"); setStatus("Seninle burada!","#4ade80"); const btn=el("mic-btn"); if(btn) btn.style.background="rgba(255,255,255,.15)"; };
  recognition.onerror=e=>{ isListening=false; const err=el("mic-err"); if(err){err.textContent=e.error==="not-allowed"?"Mikrofon izni gerekli!":"Ses duyamadım 🎤";err.style.display="block";setTimeout(()=>err.style.display="none",3000);} };
  recognition.start();
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.onload = async () => {
  screenLoading();
  const t=setTimeout(()=>screenAuth(),5000);
  try {
    const {data:{session}}=await sb.auth.getSession();
    clearTimeout(t);
    if(session?.user){ currentUser=session.user; screenChildren(); }
    else screenAuth();
  } catch(e){ clearTimeout(t); screenAuth(); }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session?.user){ currentUser=session.user; if(!currentChild) checkProfileAndRoute(); }
    else{ currentUser=null; screenAuth(); }
  });
};
