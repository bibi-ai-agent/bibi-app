<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>bibi</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:#1A2E2A;display:flex;align-items:center;justify-content:center;min-height:100vh}
    #app{width:100%;max-width:420px;min-height:100vh;background:#F8FBFA;display:flex;flex-direction:column}
    .hidden{display:none!important}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.08);opacity:.15}}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .dot{width:8px;height:8px;border-radius:50%;background:#0D9B7E;display:inline-block;animation:bounce 1s ease infinite}
    .dot:nth-child(2){animation-delay:.15s}
    .dot:nth-child(3){animation-delay:.3s}
    input:focus{outline:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#c5e8e0;border-radius:4px}
    .msg-bibi{background:white;border-radius:4px 18px 18px 18px;padding:12px 16px;max-width:75%;font-size:15px;line-height:1.55;box-shadow:0 2px 12px rgba(13,155,126,.10);color:#1A2E2A}
    .msg-user{background:#0D9B7E;border-radius:18px 4px 18px 18px;padding:12px 16px;max-width:75%;font-size:15px;line-height:1.55;color:white;font-weight:600}
    .msg-row{display:flex;margin-bottom:12px;animation:fadeUp .3s ease}
    .msg-row.user{justify-content:flex-end}
    .msg-row.bibi{justify-content:flex-start}
    button{cursor:pointer;font-family:'Nunito',sans-serif}
    .chip{background:white;border:1.5px solid #c5e8e0;border-radius:20px;padding:6px 12px;font-size:12px;color:#0D9B7E;font-weight:600}
    .tab{flex:1;padding:9px 0;border-radius:9px;border:none;font-weight:700;font-size:14px;transition:all .2s}
    .inp{padding:12px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;font-size:15px;width:100%;font-family:'Nunito',sans-serif}
    .inp::placeholder{color:rgba(255,255,255,.45)}
    .card{background:white;border-radius:16px;padding:16px 18px;box-shadow:0 2px 12px rgba(13,155,126,.10);cursor:pointer;display:flex;align-items:center;gap:14px;margin-bottom:12px;animation:fadeUp .3s ease}
  </style>
</head>

      <div id="mic-err" style="display:none;background:#fff3ee;border:1px solid #f4845f55;border-radius:10px;padding:7px 12px;font-size:12px;color:#c0552a;font-weight:600;margin-bottom:8px;text-align:center"></div>

          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="9" y="2" width="6" height="11" rx="3" fill="#0D9B7E"/><path d="M5 11a7 7 0 0 0 14 0" stroke="#0D9B7E" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="#0D9B7E" stroke-width="2" stroke-linecap="round"/><line x1="9" y1="22" x2="15" y2="22" stroke="#0D9B7E" stroke-width="2" stroke-linecap="round"/></svg>

        <button id="send-btn" onclick="sendMessage()" style="width:44px;height:44px;border-radius:50%;background:#c5e8e0;border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL  = "https://adguyijnyoicmluhursw.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFkZ3V5aWpueW9pY21sdWh1cnN3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NTQwMjAsImV4cCI6MjA5ODEzMDAyMH0.uuH3Jb-4a3ZEquduTmdb9Xv6bWPcU_gXd_5DuxM82G4";
const OPENROUTER_KEY = "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";
const OPENROUTER_URL = "https://openrouter.ai/api/v1/chat/completions";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;
let currentChild = null;
let sessionId = null;
let sessionStart = null;
let messages = [];
let voiceOn = true;
let isListening = false;
let recognition = null;
let authMode = "login";
const avatarColors = ["#0D9B7E","#7C3AED","#F59E0B","#2563EB","#EC4899"];

// ── SCREENS ──────────────────────────────────────────────────
function show(id) {
  ["loading","auth","children","chat"].forEach(s => {
    const el = document.getElementById("screen-"+s);
    if(el) el.classList.toggle("hidden", s !== id);
    if(el) el.style.display = s === id ? "flex" : "none";
  });
}

// ── INIT ─────────────────────────────────────────────────────
window.onload = async () => {
  show("loading");
  // 4 saniye timeout — takılırsa auth ekranına geç
  const t = setTimeout(() => show("auth"), 4000);
  try {
    const { data: { session } } = await sb.auth.getSession();
    clearTimeout(t);
    if (session?.user) { currentUser = session.user; loadChildren(); }
    else show("auth");
  } catch(e) { clearTimeout(t); show("auth"); }

  sb.auth.onAuthStateChange((_, session) => {
    if (session?.user) { currentUser = session.user; loadChildren(); }
    else { currentUser = null; show("auth"); }
  });
};

// ── AUTH ─────────────────────────────────────────────────────
function switchTab(mode) {
  authMode = mode;
  document.getElementById("field-name").classList.toggle("hidden", mode==="login");
  document.getElementById("tab-login").style.background = mode==="login" ? "#0D9B7E" : "transparent";
  document.getElementById("tab-login").style.color = mode==="login" ? "white" : "rgba(255,255,255,.4)";
  document.getElementById("tab-register").style.background = mode==="register" ? "#0D9B7E" : "transparent";
  document.getElementById("tab-register").style.color = mode==="register" ? "white" : "rgba(255,255,255,.4)";
  document.getElementById("auth-btn").textContent = mode==="login" ? "Giriş Yap →" : "Hesap Oluştur →";
  showAuthMsg("","");
}

function showAuthMsg(msg, type) {
  const el = document.getElementById("auth-msg");
  if(!msg){el.style.display="none";return;}
  el.style.display = "block";
  el.style.background = type==="ok" ? "rgba(13,155,126,.15)" : "rgba(244,132,95,.15)";
  el.style.border = type==="ok" ? "1px solid rgba(13,155,126,.3)" : "1px solid rgba(244,132,95,.3)";
  el.style.color = type==="ok" ? "#5eead4" : "#fca88a";
  el.textContent = msg;
}

async function doAuth() {
  const email = document.getElementById("inp-email").value.trim();
  const pw = document.getElementById("inp-pw").value;
  const name = document.getElementById("inp-name")?.value.trim();
  if(!email||!pw){showAuthMsg("E-posta ve şifre zorunlu.","err");return;}
  if(authMode==="register"&&!name){showAuthMsg("Adınızı girin.","err");return;}
  if(pw.length<6){showAuthMsg("Şifre en az 6 karakter.","err");return;}
  const btn = document.getElementById("auth-btn");
  btn.textContent="Bekleyin..."; btn.disabled=true;
  try {
    if(authMode==="register") {
      const {data,error} = await sb.auth.signUp({email,password:pw,options:{data:{full_name:name}}});
      if(error) throw error;
      if(data.user){
        await sb.from("parents").upsert({id:data.user.id,email,full_name:name});
        showAuthMsg("Hesap oluşturuldu!","ok");
        setTimeout(()=>{currentUser=data.user;loadChildren();},1000);
      }
    } else {
      const {data,error} = await sb.auth.signInWithPassword({email,password:pw});
      if(error) throw error;
      currentUser=data.user; loadChildren();
    }
  } catch(e) {
    showAuthMsg(e.message==="Invalid login credentials"?"E-posta veya şifre hatalı.":e.message,"err");
  } finally { btn.textContent=authMode==="login"?"Giriş Yap →":"Hesap Oluştur →"; btn.disabled=false; }
}

async function signOut() {
  await sb.auth.signOut();
  currentUser=null; currentChild=null;
  show("auth");
}

// ── CHILDREN ─────────────────────────────────────────────────
async function loadChildren() {
  show("children");
  document.getElementById("user-email").textContent = currentUser.email;
  const {data} = await sb.from("children").select("*").order("created_at");
  renderChildren(data||[]);
}

function renderChildren(list) {
  const el = document.getElementById("children-list");
  el.innerHTML = "";
  list.forEach((c,i) => {
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `
      <div style="width:52px;height:52px;border-radius:50%;background:${avatarColors[i%avatarColors.length]};display:flex;align-items:center;justify-content:center;font-size:22px;color:white;font-weight:800;flex-shrink:0">${c.name[0].toUpperCase()}</div>
      <div style="flex:1"><div style="font-size:17px;font-weight:800;color:#1A2E2A">${c.name}</div><div style="font-size:13px;color:#6B7280;margin-top:2px">${c.age} yaşında · ${c.total_sessions||0} oturum</div></div>
      <button onclick="event.stopPropagation();deleteChild('${c.id}')" style="width:30px;height:30px;border-radius:50%;background:#fff3ee;border:1px solid #fcddd5;font-size:14px">🗑️</button>
      <div style="font-size:20px;color:#d1d5db">›</div>
    `;
    d.onclick = () => startChat(c);
    el.appendChild(d);
  });
}

function showAddForm(){document.getElementById("add-form").classList.remove("hidden");document.getElementById("show-add-btn").classList.add("hidden");}
function hideAddForm(){document.getElementById("add-form").classList.add("hidden");document.getElementById("show-add-btn").classList.remove("hidden");}

async function addChild() {
  const name = document.getElementById("new-name").value.trim();
  const age = document.getElementById("new-age").value;
  if(!name) return;
  const btn = document.getElementById("add-btn");
  btn.textContent="Kaydediliyor..."; btn.disabled=true;
  const {data} = await sb.from("children").insert({parent_id:currentUser.id,name,age:parseInt(age),language:"tr"}).select().single();
  btn.textContent="Profil Ekle →"; btn.disabled=false;
  if(data){ hideAddForm(); document.getElementById("new-name").value=""; loadChildren(); }
}

async function deleteChild(id) {
  if(!confirm("Bu profili silmek istiyor musun?")) return;
  await sb.from("children").delete().eq("id",id);
  loadChildren();
}

// ── CHAT ─────────────────────────────────────────────────────
async function startChat(child) {
  currentChild = child;
  messages = [];
  sessionStart = new Date();
  show("chat");
  document.getElementById("messages").innerHTML="";
  document.getElementById("quick-prompts").style.display="flex";

  const {data} = await sb.from("sessions").insert({child_id:child.id,started_at:new Date().toISOString()}).select().single();
  if(data) sessionId = data.id;

  addMessage("bibi", `Merhaba ${child.name}! 👋 Ben Bibi — seninle öğrenmek için buradayım. Bugün ne hakkında konuşmak istersin? 🌟`);
}

async function goBack() {
  if(sessionId) {
    const mins = Math.round((new Date()-sessionStart)/60000);
    await sb.from("sessions").update({ended_at:new Date().toISOString(),duration_mins:mins,message_count:messages.filter(m=>m.r==="user").length}).eq("id",sessionId);
  }
  sessionId=null; loadChildren();
}

function addMessage(role, text) {
  messages.push({r:role,t:text});
  const el = document.getElementById("messages");
  const row = document.createElement("div");
  row.className = "msg-row " + (role==="bibi"?"bibi":"user");
  const bubble = document.createElement("div");
  bubble.className = role==="bibi"?"msg-bibi":"msg-user";
  bubble.textContent = text;
  row.appendChild(bubble);
  if(role==="bibi") {
    const btn = document.createElement("button");
    btn.style.cssText="width:28px;height:28px;border-radius:50%;background:#f0f7f5;border:1.5px solid #c5e8e0;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7;align-self:flex-end";
    btn.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="#0D9B7E"/></svg>';
    btn.onclick=()=>speak(text);
    row.appendChild(btn);
  }
  el.appendChild(row);
  el.scrollTop=el.scrollHeight;
  if(messages.length>2) document.getElementById("quick-prompts").style.display="none";
}

function addTyping() {
  const el = document.getElementById("messages");
  const row = document.createElement("div");
  row.id="typing-row";row.className="msg-row bibi";
  row.innerHTML='<div class="msg-bibi" style="display:flex;gap:5px;align-items:center"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}

function removeTyping(){const t=document.getElementById("typing-row");if(t)t.remove();}

function setInput(v){document.getElementById("chat-input").value=v;}

function setStatus(text,color){
  document.getElementById("status-text").textContent=text;
  document.getElementById("status-dot").style.background=color;
}

function buildPrompt(child){
  const tone=child.age<=8?"Çok kısa cümleler. Bol emoji 😊":child.age<=12?"Dengeli açıklamalar.":"Akran gibi konuş.";
  return `Sen Bibi'sin — ${child.age} yaşındaki ${child.name} için AI öğrenme arkadaşısın. Sıcak, sabırlı ve meraklısın. Asla "yanlış" demezsin. Her cevabının sonunda soru sorarsın. ${tone} Dil: Türkçe. Kısa cevaplar ver.`;
}

async function sendMessage(){
  const inp=document.getElementById("chat-input");
  const text=inp.value.trim(); if(!text) return;
  inp.value="";
  addMessage("user",text);
  document.getElementById("send-btn").style.background="#c5e8e0";
  setStatus("Düşünüyor...","#fbbf24");
  addTyping();

  if(sessionId) sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"user",content:text,language:"tr"});

  try {
    const apiMsgs = messages.filter(m=>m.r!=="bibi"||messages.indexOf(m)===0).map(m=>({role:m.r==="bibi"?"assistant":"user",content:m.t}));
    // OpenRouter API
    const chatMsgs = [
      {role:"system", content: buildPrompt(currentChild)},
      ...messages.map(m=>({role: m.r==="bibi"?"assistant":"user", content: m.t}))
    ];
    const res = await fetch(OPENROUTER_URL, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization": `Bearer ${OPENROUTER_KEY}`,
        "HTTP-Referer": "https://bibi-app-rho.vercel.app",
        "X-Title": "Bibi"
      },
      body:JSON.stringify({
        model: "google/gemini-2.0-flash-lite:free",
        messages: chatMsgs,
        max_tokens: 1000
      })
    });
    const data=await res.json();
    console.log("OpenRouter response:", JSON.stringify(data));
    const reply=data.choices?.[0]?.message?.content||data.error?.message||"Bir sorun oluştu 🙈";
    removeTyping();
    addMessage("bibi",reply);
    setStatus("Seninle burada!","#4ade80");
    document.getElementById("send-btn").style.background="#0D9B7E";
    speak(reply);
    if(sessionId) sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"assistant",content:reply,language:"tr"});
  } catch(e){
    removeTyping();
    addMessage("bibi","Bağlantıda sorun var 😅 Tekrar dener misin?");
    setStatus("Seninle burada!","#4ade80");
  }
}

// ── VOICE ─────────────────────────────────────────────────────
function speak(text){
  if(!voiceOn||!window.speechSynthesis) return;
  const clean=text.replace(/[\u{1F000}-\u{1FFFF}]/gu,"").trim();
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang="tr-TR";u.rate=0.92;u.pitch=1.15;
  const vs=window.speechSynthesis.getVoices();
  const tv=vs.find(v=>v.lang.startsWith("tr"));if(tv)u.voice=tv;
  u.onstart=()=>setStatus("Konuşuyor...","#a78bfa");
  u.onend=()=>setStatus("Seninle burada!","#4ade80");
  window.speechSynthesis.speak(u);
}

function toggleVoice(){
  voiceOn=!voiceOn;
  const btn=document.getElementById("voice-btn");
  btn.style.background=voiceOn?"rgba(255,255,255,.2)":"rgba(0,0,0,.3)";
  if(!voiceOn) window.speechSynthesis?.cancel();
}

function toggleMic(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showMicErr("Chrome kullan! 🎙️");return;}
  if(isListening){recognition?.stop();return;}
  recognition=new SR();recognition.lang="tr-TR";recognition.continuous=false;recognition.interimResults=true;
  recognition.onstart=()=>{isListening=true;setStatus("Seni dinliyorum 🎙️","#F4845F");document.getElementById("mic-btn").style.background="#F4845F";document.getElementById("chat-input").placeholder="Dinliyorum...";};
  recognition.onresult=e=>{let t="";for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;document.getElementById("chat-input").value=t;};
  recognition.onend=()=>{isListening=false;setStatus("Seninle burada!","#4ade80");document.getElementById("mic-btn").style.background="#f0f7f5";document.getElementById("chat-input").placeholder="Bibi'ye yaz veya konuş...";};
  recognition.onerror=e=>{isListening=false;showMicErr(e.error==="not-allowed"?"Mikrofon izni gerekli!":"Ses duyamadım 🎤");};
  recognition.start();
}

function showMicErr(msg){const el=document.getElementById("mic-err");el.textContent=msg;el.style.display="block";setTimeout(()=>el.style.display="none",3000);}
</script>
