async function generateImage(prompt){
  const age = currentChild?.age || 9;
  const stylePrompt = getImageStyle(age);
  const translateRes = await callAI(null, [{role:"user", content:`Translate to English for image generation, max 12 words: "${prompt}"`}], 60);
  const englishPrompt = (translateRes?.trim() || prompt).replace(/['"]/g,"");
  const safePrompt = encodeURIComponent(`${englishPrompt}, ${stylePrompt}`);
  const seed = Math.floor(Math.random()*1000000);
  const url = `https://image.pollinations.ai/prompt/${safePrompt}?width=512&height=512&seed=${seed}&nologo=true&model=turbo`;
  return url;
}
async function callAI(systemPrompt, messages, maxTokens=1000){
  const turkishRule = "KRİTİK: Her zaman sadece Türkçe kullan. İngilizce, Çince, Rusça veya başka herhangi bir dil kesinlikle yasak.";
  const finalSystem = systemPrompt ? `${turkishRule}\n\n${systemPrompt}` : turkishRule;
  const apiMessages = [{role:"system", content: finalSystem}];
  (messages||[]).forEach(m => apiMessages.push({role: m.role||"user", content: m.content}));

  const res = await fetch(GROQ_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": `Bearer ${GROQ_KEY}`
    },
    body: JSON.stringify({
      model: "llama-3.3-70b-versatile",
      messages: apiMessages,
      max_tokens: maxTokens,
      temperature: 0.7
    })
  });

  const data = await res.json();
  if(!res.ok) throw new Error(data.error?.message || "Groq API hatası");
  return data.choices?.[0]?.message?.content || "";
}

function floatingBibis(count=6, colors=["#0D9B7E"]){
  const anims = ["floatBibi","floatBibi2","floatBibi3"];
  let html = "";
  for(let i=0;i<count;i++){
    const size = 60 + Math.random()*80;
    const x = Math.random()*90;
    const y = Math.random()*90;
    const anim = anims[i%3];
    const dur = 4 + Math.random()*4;
    const delay = Math.random()*3;
    const color = colors[i%colors.length];
    html += `<div class="bg-bibi" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;animation:${anim} ${dur}s ${delay}s ease-in-out infinite">${bgBibiSVG(size,color)}</div>`;
  }
  return html;
}

function getAgeGroup(age){
  if(!age || age<=8) return "young";
  if(age<=12) return "middle";
  return "teen";
}

function floatingBubbles(children=[], theme={}){
  const {
    questionBg = "rgba(13,155,126,0.12)",
    questionBorder = "rgba(13,155,126,0.25)",
    questionColor = "rgba(13,155,126,0.7)",
    chatBg = "rgba(255,255,255,0.10)",
    chatBorder = "rgba(255,255,255,0.18)",
    chatColor = "rgba(255,255,255,0.55)"
  } = theme;
  // Get all unique age groups from children
  const groups = children.length > 0 
    ? [...new Set(children.map(c=>getAgeGroup(c.age)))]
    : ["young","middle"];
  
  // Mix content from all children's age groups
  let allQ = [], allC = [];
  groups.forEach(g=>{
    allQ.push(...BUBBLE_CONTENT[g].questions);
    allC.push(...BUBBLE_CONTENT[g].chat);
  });
  
  // Shuffle
  const shuffle = arr => arr.sort(()=>Math.random()-.5);
  allQ = shuffle(allQ).slice(0,8);
  allC = shuffle(allC).slice(0,7);
  
  const anims = ["floatBibi","floatBibi2","floatBibi3"];
  const positions = [
    {x:2,y:5},{x:65,y:3},{x:80,y:15},{x:5,y:25},{x:70,y:28},
    {x:15,y:45},{x:75,y:42},{x:3,y:60},{x:60,y:58},{x:85,y:60},
    {x:10,y:75},{x:55,y:72},{x:80,y:78},{x:20,y:88},{x:65,y:88}
  ];
  
  let html = "";
  const allBubbles = [
    ...allQ.map(t=>({text:t,type:"question"})),
    ...allC.map(t=>({text:t,type:"chat"}))
  ];
  shuffle(allBubbles);
  
  allBubbles.slice(0,15).forEach((b,i)=>{
    const pos = positions[i%positions.length];
    const anim = anims[i%3];
    const dur = 5+Math.random()*5;
    const delay = Math.random()*4;
    const isQ = b.type==="question";
    const bg = isQ ? questionBg : chatBg;
    const border = isQ ? `1.5px solid ${questionBorder}` : `1.5px solid ${chatBorder}`;
    const textColor = isQ ? questionColor : chatColor;
    html += `<div style="position:absolute;left:${pos.x}%;top:${pos.y}%;background:${bg};border:${border};border-radius:20px;padding:8px 14px;font-size:12px;font-weight:700;color:${textColor};white-space:nowrap;animation:${anim} ${dur}s ${delay}s ease-in-out infinite;pointer-events:none;max-width:200px;backdrop-filter:blur(4px)">${b.text}</div>`;
  });
  return html;
}

const TOPICS = {
  "Matematik":["matematik","sayı","toplama","çıkarma","çarpma","bölme","kesir","geometri","denklem","yüzde"],
  "Fen":["fen","fizik","kimya","biyoloji","deney","atom","hücre","enerji","kuvvet","gezegen"],
  "Dil":["türkçe","kelime","cümle","hikaye","şiir","okuma","dilbilgisi","ingilizce","dil"],
  "Tarih":["tarih","osmanlı","atatürk","savaş","medeniyet","cumhuriyet"],
};
function detectTopic(t){
  const l=t.toLowerCase();
  for(const[k,v]of Object.entries(TOPICS)) if(v.some(w=>l.includes(w))) return k;
  return "Genel";
}

// Sokratik ödev sinyalleri — bu kelimeler geçiyorsa "homework mode" aktif olur
const HOMEWORK_SIGNALS = ["ödev","nasıl çözülür","nasıl yapılır","cevap nedir","sonuç ne","bul","hesapla","çöz"];
function isHomeworkQuestion(t){
  const l=t.toLowerCase();
  return HOMEWORK_SIGNALS.some(w=>l.includes(w));
}

// Ustalık skoru — her konuda mesaj attıkça yavaşça artar (basit, kademeli model)
async function updateMastery(childId, topic){
  if(topic==="Genel") return;
  try{
    const {data:existing} = await sb.from("mastery").select("*").eq("child_id",childId).eq("topic",topic).single();
    if(existing){
      const newScore = Math.min(100, existing.score + 2);
      await sb.from("mastery").update({score:newScore, message_count:existing.message_count+1, updated_at:new Date().toISOString()}).eq("id",existing.id);
    } else {
      await sb.from("mastery").insert({child_id:childId, topic, score:8, message_count:1});
    }
    // Uzmanlık alanını güncelle — en yüksek skorlu konu
    const {data:all} = await sb.from("mastery").select("topic,score").eq("child_id",childId).order("score",{ascending:false}).limit(1);
    if(all && all[0]){
      await sb.from("children").update({bibi_specialty:all[0].topic}).eq("id",childId);
      if(currentChild && currentChild.id===childId) currentChild.bibi_specialty=all[0].topic;
    }
  }catch(e){
    await sb.from("mastery").insert({child_id:childId, topic, score:8, message_count:1}).then(()=>{}).catch(()=>{});
  }
}

// ── Arkadaş Ekle Ekranı ───────────────────────────────────────
// ── Presence (online/offline durumu) ─────────────────────────
let presenceChannel = null;

function startPresence(children){
  if(presenceChannel){ sb.removeChannel(presenceChannel); presenceChannel=null; }
  if(!children||children.length===0) return;

  presenceChannel = sb.channel('bibi-presence', {
    config: { presence: { key: currentUser.id } }
  });

  presenceChannel
    .on('presence', { event: 'sync' }, () => {
      const state = presenceChannel.presenceState();
      updatePresenceUI(state, children);
    })
    .on('presence', { event: 'join' }, ({ newPresences }) => {
      const state = presenceChannel.presenceState();
      updatePresenceUI(state, children);
    })
    .on('presence', { event: 'leave' }, ({ leftPresences }) => {
      const state = presenceChannel.presenceState();
      updatePresenceUI(state, children);
    })
    .subscribe(async (status) => {
      if(status === 'SUBSCRIBED'){
        // Tüm çocuk ID'lerini online olarak gönder
        await presenceChannel.track({
          user_id: currentUser.id,
          child_ids: children.map(c=>c.id),
          online_at: new Date().toISOString()
        });
      }
    });
}

function updatePresenceUI(state, myChildren){
  const onlineChildIds = new Set();
  Object.values(state).forEach(presences => {
    presences.forEach(p => {
      if(p.child_ids) p.child_ids.forEach(id => onlineChildIds.add(id));
    });
  });

  const myChildIds = new Set(myChildren.map(c=>c.id));

  document.querySelectorAll('[id^="presence-"]').forEach(dot => {
    if(!dot.id.startsWith('presence-') || dot.id.includes('label')) return;
    const childId = dot.id.replace('presence-','');
    if(myChildIds.has(childId)) return;
    const isOnline = onlineChildIds.has(childId);
    dot.style.background = isOnline ? '#4ade80' : '#ef4444';
    dot.title = isOnline ? 'Çevrimiçi' : 'Çevrimdışı';

    const label = document.getElementById(`presence-label-${childId}`);
    if(label){
      label.textContent = isOnline ? '● Çevrimiçi' : '● Çevrimdışı';
      label.style.color = isOnline ? '#4ade80' : '#ef4444';
    }
  });
}

// ── Bekleyen davetleri kontrol et (uygulama açılınca) ────────
async function checkPendingInvites(children){
  const childIds = children.map(c=>c.id);
  if(childIds.length===0) return;

  const now = new Date().toISOString();

  // Süresi dolmuş davetleri pasife al
  await sb.from("project_invites")
    .update({status:"rejected"})
    .eq("status","pending")
    .lt("expires_at", now);

  // Bekleyen aktif davetleri çek
  for(const childId of childIds){
    const {data:invites} = await sb.from("project_invites")
      .select("*")
      .eq("to_child_id", childId)
      .eq("status","pending")
      .gt("expires_at", now)
      .order("created_at",{ascending:false})
      .limit(1);

    if(!invites||invites.length===0) continue;

    const invite = invites[0];
    const {data:fromChild} = await sb.from("children_invite_lookup")
      .select("id,name,gender,bibi_specialty")
      .eq("id",invite.from_child_id).single();
    const toChild = children.find(c=>c.id===childId);
    if(!fromChild||!toChild) continue;

    // Kalan süreyi hesapla
    const expiresAt = new Date(invite.expires_at);
    const remaining = Math.max(0, Math.floor((expiresAt - new Date())/1000/60)); // dakika

    showInviteNotification(fromChild, toChild, invite, remaining);
  }
}

// ── Global proje daveti dinleyici ────────────────────────────
function startGlobalInviteListener(children){
  if(window._globalInviteChannel) sb.removeChannel(window._globalInviteChannel);
  const childIds = children.map(c=>c.id);
  if(childIds.length===0) return;

  window._globalInviteChannel = sb
    .channel('global-invites-'+Date.now())
    .on('postgres_changes',{
      event:'INSERT', schema:'public', table:'project_invites'
    }, async payload => {
      const inv = payload.new;
      if(!childIds.includes(inv.to_child_id)) return;
      if(inv.status !== 'pending') return;
      const {data:fromChild} = await sb.from("children_invite_lookup")
        .select("id,name,gender,bibi_specialty").eq("id",inv.from_child_id).single();
      const toChild = children.find(c=>c.id===inv.to_child_id);
      if(!fromChild||!toChild) return;
      showInviteNotification(fromChild, toChild, inv);
    })
    .subscribe();
}

  // Arkadaşlık zaten var mı?
  const {data:ex1} = await sb.from("friendships").select("id").eq("child_id_1",myChildId).eq("child_id_2",friend.id);
  const {data:ex2} = await sb.from("friendships").select("id").eq("child_id_1",friend.id).eq("child_id_2",myChildId);
  if((ex1&&ex1.length>0)||(ex2&&ex2.length>0)){
    showFriendMsg(`${friend.name} zaten arkadaşınız!`,"ok");
    return;
  }

  // Arkadaşlık oluştur
  const {error} = await sb.from("friendships").insert({
    child_id_1: myChildId,
    child_id_2: friend.id,
    status: "active",
    invited_by: myChildId
  });
  if(error){ showFriendMsg("Hata: "+error.message,"err"); return; }

  showFriendMsg(`${friend.name} arkadaş olarak eklendi! 🎉`,"ok");
  document.getElementById("friend-code-inp").value="";

  // Ekranı yenile
  const {data:updatedChild} = await sb.from("children").select("*").eq("id",myChildId).single();
  if(updatedChild) screenFriends(updatedChild);
}

}

async function sendProjectInvite(projectType){
  const myChild = window._projectChild;
  const friend = window._projectFriend;
  const friendshipId = window._projectFriendshipId;
  const typeNames = {story:"Hikaye Yazma",experiment:"Deney Tasarlama",quiz:"Bilgi Yarışması"};

  // Önce bekleyen davet var mı kontrol et
  const {data:existing} = await sb.from("project_invites")
    .select("id").eq("friendship_id",friendshipId).eq("status","pending");
  if(existing&&existing.length>0){
    await sb.from("project_invites").delete().eq("friendship_id",friendshipId).eq("status","pending");
  }

  // Yeni davet oluştur
  const expiresAt = new Date(Date.now() + 3*60*60*1000).toISOString(); // 3 saat
  const {data:invite, error} = await sb.from("project_invites").insert({
    friendship_id: friendshipId,
    from_child_id: myChild.id,
    to_child_id: friend.id,
    status: "pending",
    project_type: projectType,
    expires_at: expiresAt
  }).select().single();

  if(error){ alert("Davet gönderilemedi: "+error.message); return; }

  // Bekleme ekranı göster
  screenWaitingForAccept(myChild, friend, projectType, invite.id);
}

async function sendProjectAI(userText){
  const state = window._projectState;
  addProjectTyping();
  const specialtyIcons = {Matematik:"📐",Fen:"🔬",Dil:"📖",Tarih:"🏛️",Sanat:"🎨"};
  const s1 = state.myChild.bibi_specialty, s2 = state.friend.bibi_specialty;

  const systemPrompt = `Sen iki farklı çocuğun Bibi'si olarak konuşuyorsun:
- ${state.myChild.name}'in Bibi'si${s1?` (${s1} ${specialtyIcons[s1]||"⭐"} uzmanı)`:""}
- ${state.friend.name}'in Bibi'si${s2?` (${s2} ${specialtyIcons[s2]||"⭐"} uzmanı)`:""}

Proje türü: ${state.projectType}
İki çocuk birlikte bir ${state.projectType==="story"?"hikaye":state.projectType==="experiment"?"fen deneyi":"bilgi yarışması"} yapıyor.

KURALLAR:
• İki Bibi'nin sesini de yansıt — farklı uzmanlıkları olan iki arkadaş gibi
• Her ikisine de hitap et, ikisinden de katkı iste
• Kısa, heyecanlı ve işbirlikçi yanıtlar ver
• Projeyi adım adım ilerlet, her adımda onlardan bir şey sor
• Türkçe konuş`;

  const apiMessages = [
    ...state.messages,
    {role:"user", content:userText}
  ];

  try{
    const reply = await callAI(systemPrompt, apiMessages, 800);
    const t=document.getElementById("proj-typing"); if(t) t.remove();
    addProjectMsg("bibi", reply);
    state.messages.push({role:"user",content:userText},{role:"assistant",content:reply});

    // Projeyi kaydet
    if(state.friendshipId){
      await sb.from("projects").upsert({friendship_id:state.friendshipId,type:state.projectType,content:JSON.stringify(state.messages),title:`${state.myChild.name} & ${state.friend.name} - ${new Date().toLocaleDateString("tr-TR")}`});
    }
  }catch(e){
    const t=document.getElementById("proj-typing"); if(t) t.remove();
    addProjectMsg("bibi","Bağlantıda sorun var 😅");
  }
}

function sendProjectMsg(){
  const inp = document.getElementById("project-inp");
  const text = inp?.value.trim(); if(!text) return;
  inp.value="";
  addProjectMsg("user",text);
  sendProjectAI(text);
}

  // Son 5 mesajı al
  const recentMsgs = messages.slice(-10).map(m=>m.t).join("\n");

  const prompt = `Aşağıdaki Türkçe çocuk mesajlarını analiz et.

Yaş: ${currentChild?.age||9}
Mesajlar: ${recentMsgs}

SADECE şu JSON formatında yanıt ver, başka hiçbir şey yazma, Türkçe dışında dil kullanma:
{"emotion":"[DEĞER]","interest_area":"[DEĞER]","confidence":[0-100],"character_hint":"[TÜRKÇE]","engagement":"[DEĞER]"}

  try{

// Haftalık rapor üret (manuel tetiklenir)
async function generateWeeklyReport(child){
  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - 7);

  const [{data:emotions=[]},{data:sessions=[]},{data:quizSessions=[]}] = await Promise.all([
    sb.from("emotion_logs").select("*").eq("child_id",child.id).gte("created_at",weekStart.toISOString()),
    sb.from("sessions").select("*").eq("child_id",child.id).gte("started_at",weekStart.toISOString()),
    sb.from("quiz_sessions").select("*").eq("child_id",child.id).eq("completed",true).gte("created_at",weekStart.toISOString())
  ]);

  const {data:msgs=[]} = await sb.from("messages")
    .select("content,role,created_at")
    .eq("child_id",child.id)
    .eq("role","user")
    .gte("created_at",weekStart.toISOString())
    .limit(50);

  // Duygu dağılımı
  const emotionCounts = {};
  const interestCounts = {};
  emotions.forEach(e=>{
    emotionCounts[e.emotion]=(emotionCounts[e.emotion]||0)+1;
    interestCounts[e.interest_area]=(interestCounts[e.interest_area]||0)+1;
  });

  const dominantEmotion = Object.entries(emotionCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||"calm";
  const topInterests = Object.entries(interestCounts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]);

  // Quiz sonuçları
  const quizResults = quizSessions.map(q=>q.scores||{});

  const reportPrompt = `Sen bir çocuk psikoloji uzmanısın. Aşağıdaki verilere göre ${child.age} yaşındaki ${child.name} için haftalık gelişim raporu yaz.

VERİLER:
- Toplam oturum: ${sessions.length}
- Toplam konuşma dakikası: ${sessions.reduce((s,x)=>s+(x.duration_mins||0),0)}
- Baskın duygu bu hafta: ${dominantEmotion}
- Duygu dağılımı: ${JSON.stringify(emotionCounts)}
- İlgi alanları: ${JSON.stringify(interestCounts)}
- Çocuğun mesajlarından örnekler: ${msgs.slice(0,10).map(m=>m.content).join(" | ")}
- Karakter gözlemleri: ${emotions.map(e=>e.character_hint).filter(Boolean).join(", ")}
- Quiz sonuçları: ${JSON.stringify(quizResults)}

Raporu şu başlıklar altında yaz (Türkçe, veliye hitap ederek, samimi ve destekleyici bir dille):
1. 💙 Duygusal Durum (2-3 cümle)
2. ⭐ İlgi Alanları & Güçlü Yönler (2-3 cümle)
3. 🌱 Karakter Gözlemleri (2-3 cümle)
4. ⚠️ Dikkat Edilmesi Gerekenler (varsa, 1-2 cümle — yoksa "Bu hafta endişe verici bir durum gözlemlenmedi" yaz)
5. 💡 Ebeveyn Önerileri (2-3 pratik öneri)

ÖNEMLİ: Hiçbir zaman "kazandı/kaybetti" veya başka çocuklarla kıyaslama yapma. Sadece ${child.name}'in kendine özgü gelişimini anlat.`;

  const summary = await callAI(null, [{role:"user",content:reportPrompt}], 1500);

  // Kaydet
  await sb.from("weekly_reports").upsert({
    child_id:child.id,
    week_start:weekStart.toISOString().split("T")[0],
    summary,
    dominant_emotion:dominantEmotion,
    top_interests:topInterests,
    character_notes:emotions.map(e=>e.character_hint).filter(Boolean).join("; ")
  });

  return {summary, dominantEmotion, topInterests, emotionCounts, interestCounts};
}

async function generateQuizQuestions(child){
  const age = child.age||9;
  const optCount = age<=8 ? 2 : age<=12 ? 3 : 4;

  const difficulty = age<=8
    ? "çok basit, somut, günlük hayat örnekleriyle, 1. ve 2. sınıf düzeyinde"
    : age<=12
    ? "orta zorlukta, okul müfredatına uygun, 3-6. sınıf düzeyinde"
    : "biraz zorlayıcı, analitik düşünme gerektiren, 7-9. sınıf düzeyinde";

  const prompt = `${age} yaşında bir çocuk için Türkçe bilgi yarışması soruları üret.
Zorluk seviyesi: ${difficulty}
Her dersten 1 soru olmak üzere tam 5 soru üret: Türkçe, Matematik, Fen Bilimleri, Sosyal Bilgiler, İngilizce
Her soru için ${optCount} şık olsun. Şıklar A, B${optCount>=3?", C":""}${optCount>=4?", D":""} şeklinde olsun.
SADECE aşağıdaki JSON formatında yanıt ver, başka hiçbir şey yazma:
{
  "questions": [
    {
      "subject": "Türkçe",
      "question": "soru metni",
      "options": ["A) ...", "B) ..."${optCount>=3?', "C) ..."':""}${optCount>=4?', "D) ..."':""}],
      "correct": "A",
      "explanation": "kısa açıklama"
    }
  ]
}`;

  try{
    let text = await callAI(null, [{role:"user",content:prompt}], 2000);
    text = text.replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(text);
    return parsed.questions;
  }catch(e){
    console.error("Quiz soru üretme hatası:",e);
    return null;
  }
}

async function selectAnswer(letter){
  const {questions, currentQ, answers, child} = quizState;
  const q = questions[currentQ];
  const isCorrect = letter === q.correct;

  // Seçilen şıkkı renklendir
  document.querySelectorAll("[id^='opt-']").forEach(btn=>{
    btn.style.pointerEvents = "none";
    btn.onmouseover = null; btn.onmouseout = null;
  });

  const selectedBtn = document.getElementById(`opt-${letter}`);
  const correctBtn = document.getElementById(`opt-${q.correct}`);
  if(selectedBtn) selectedBtn.style.background = isCorrect ? "rgba(74,222,128,.25)" : "rgba(244,132,95,.25)";
  if(selectedBtn) selectedBtn.style.borderColor = isCorrect ? "#4ade80" : "#F4845F";
  if(!isCorrect && correctBtn){ correctBtn.style.background="rgba(74,222,128,.15)"; correctBtn.style.borderColor="#4ade80"; }

  // Açıklama göster
  const container = document.getElementById("options-container");
  if(container){
    const expDiv = document.createElement("div");
    expDiv.style.cssText = `margin-top:14px;padding:12px 16px;border-radius:12px;background:${isCorrect?"rgba(74,222,128,.1)":"rgba(244,132,95,.1)"};border:1px solid ${isCorrect?"rgba(74,222,128,.3)":"rgba(244,132,95,.3)"};color:${isCorrect?"#4ade80":"#fca88a"};font-size:13px;font-weight:600`;
    expDiv.innerHTML = `${isCorrect?"✅ Harika! ":"❌ Doğrusu ${q.correct}. "} ${q.explanation||""}`;
    container.appendChild(expDiv);

    // Devam butonu
    const nextBtn = document.createElement("button");
    nextBtn.style.cssText = "margin-top:12px;width:100%;padding:13px;border-radius:14px;border:none;background:#0D9B7E;color:white;font-weight:800;font-size:15px;cursor:pointer";
    nextBtn.textContent = currentQ+1 < questions.length ? "Sonraki Soru →" : "Sonuçları Gör 🏆";
    nextBtn.onclick = ()=>{
      quizState.answers.push({subject:q.subject, correct:isCorrect, answer:letter, correctAnswer:q.correct});
      quizState.currentQ++;
      showQuizQuestion();
    };
    container.appendChild(nextBtn);
  }
}

function getTheme(child){
  if(!child) return { bg:"linear-gradient(135deg,#1A2E2A 0%,#243d38 100%)", header:"linear-gradient(135deg,#0D9B7E,#0a7a63)", bubble:"#0D9B7E", colors:["#0D9B7E"] };
  const isGirl = child.gender==="kız";
  const isYoung = child.age<=8;
  if(isGirl && isYoung) return {
    bg:"linear-gradient(135deg,#2d1b3d 0%,#1a1040 50%,#2d0f2d 100%)",
    header:"linear-gradient(135deg,#b5449a,#7c2d8e)",
    bubble:"#b5449a", colors:["#e879c8","#a855f7","#ec4899"],
    stars:true
  };
  if(isGirl && !isYoung) return {
    bg:"linear-gradient(135deg,#1e1040 0%,#2d1b4e 100%)",
    header:"linear-gradient(135deg,#7c3aed,#5b21b6)",
    bubble:"#7c3aed", colors:["#a78bfa","#c084fc","#e879c8"],
    stars:true
  };
  if(!isGirl && isYoung) return {
    bg:"linear-gradient(135deg,#0c2340 0%,#1a3a5c 100%)",
    header:"linear-gradient(135deg,#2563eb,#1d4ed8)",
    bubble:"#2563eb", colors:["#3b82f6","#0ea5e9","#0D9B7E"]
  };
  return {
    bg:"linear-gradient(135deg,#1a2e2a 0%,#0f2535 100%)",
    header:"linear-gradient(135deg,#0D9B7E,#0369a1)",
    bubble:"#0D9B7E", colors:["#0D9B7E","#0ea5e9","#3b82f6"]

}

let regMethod = "email", loginMethodCurrent = "email", selectedGender = "";

function switchAuthMode(mode){
  authMode = mode;
  el("tab-login").style.background = mode==="login" ? "#0D9B7E" : "transparent";
  el("tab-login").style.color = mode==="login" ? "white" : "rgba(255,255,255,.45)";
  el("tab-reg").style.background = mode==="register" ? "#0D9B7E" : "transparent";
  el("tab-reg").style.color = mode==="register" ? "white" : "rgba(255,255,255,.45)";
  el("login-form").classList.toggle("hidden", mode!=="login");
  showStep(mode==="register" ? 1 : 0);
}

function showStep(step){
  [1,2,3].forEach(s => {
    const e = el(`reg-form-${s}`);
    if(e){ e.classList.toggle("hidden", s!==step); }
  });
}

function switchMethod(m){
  loginMethodCurrent = m;
  el("m-email").style.background = m==="email" ? "rgba(255,255,255,.15)" : "transparent";
  el("m-email").style.borderColor = m==="email" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("m-email").style.color = m==="email" ? "white" : "rgba(255,255,255,.45)";
  el("m-phone").style.background = m==="phone" ? "rgba(255,255,255,.15)" : "transparent";
  el("m-phone").style.borderColor = m==="phone" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("m-phone").style.color = m==="phone" ? "white" : "rgba(255,255,255,.45)";
  el("login-email-fields").classList.toggle("hidden", m!=="email");
  el("login-phone-fields").classList.toggle("hidden", m!=="phone");
  el("login-btn").textContent = m==="phone" ? "Kod Gönder →" : "Giriş Yap →";
  el("login-btn").onclick = m==="phone" ? doLoginPhone : doLogin;
}

function switchRegMethod(m){
  regMethod = m;
  el("rm-email").style.background = m==="email" ? "rgba(255,255,255,.15)" : "transparent";
  el("rm-email").style.borderColor = m==="email" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("rm-email").style.color = m==="email" ? "white" : "rgba(255,255,255,.45)";
  el("rm-phone").style.background = m==="phone" ? "rgba(255,255,255,.15)" : "transparent";
  el("rm-phone").style.borderColor = m==="phone" ? "rgba(255,255,255,.3)" : "rgba(255,255,255,.1)";
  el("rm-phone").style.color = m==="phone" ? "white" : "rgba(255,255,255,.45)";
  el("reg-email-fields").classList.toggle("hidden", m!=="email");
  el("reg-phone-fields").classList.toggle("hidden", m!=="phone");
}

function selectGender(g){
  selectedGender = g;
  ["kiz","erkek"].forEach(id => {
    const btn = el(`g-${id}`);
    const active = (id==="kiz"&&g==="kız")||(id==="erkek"&&g==="erkek");
    btn.style.background = active ? "rgba(255,255,255,.2)" : "transparent";
    btn.style.borderColor = active ? "rgba(255,255,255,.5)" : "rgba(255,255,255,.15)";
    btn.style.color = active ? "white" : "rgba(255,255,255,.5)";
  });
}

async function doLogin(){
  const email = el("l-email")?.value.trim();
  const pw = el("l-pw")?.value;
  if(!email||!pw){ showMsg("login-msg","E-posta ve şifre girin.","err"); return; }
  el("login-btn").textContent = "Giriş yapılıyor..."; el("login-btn").disabled=true;
  const {data,error} = await sb.auth.signInWithPassword({email,password:pw});
  el("login-btn").textContent = "Giriş Yap →"; el("login-btn").disabled=false;
  if(error){ showMsg("login-msg", error.message==="Invalid login credentials"?"E-posta veya şifre hatalı.":error.message,"err"); return; }
  currentUser=data.user; await checkProfileAndRoute();
}

async function doLoginPhone(){
  const phone = el("l-phone")?.value.trim();
  if(!phone){ showMsg("login-msg","Telefon numarası girin.","err"); return; }
  const {error} = await sb.auth.signInWithOtp({phone});
  if(error){ showMsg("login-msg","SMS gönderilemedi: "+error.message,"err"); return; }
  el("otp-row").classList.remove("hidden");
  el("login-btn").textContent = "Kodu Doğrula →";
  el("login-btn").onclick = verifyOTP;
  showMsg("login-msg","SMS gönderildi! Kodu girin.","ok");
}

async function verifyOTP(){
  const phone = el("l-phone")?.value.trim();
  const token = el("l-otp")?.value.trim();
  const {data,error} = await sb.auth.verifyOtp({phone, token, type:"sms"});
  if(error){ showMsg("login-msg","Kod hatalı.","err"); return; }
  currentUser=data.user; await checkProfileAndRoute();
}

async function regStep1Next(){
  if(regMethod==="email"){
    const email=el("r-email")?.value.trim(), pw=el("r-pw")?.value;
    if(!email||!pw){ showMsg("reg-msg-1","E-posta ve şifre gerekli.","err"); return; }
    if(pw.length<6){ showMsg("reg-msg-1","Şifre en az 6 karakter olmalı.","err"); return; }
    regData.email=email; regData.pw=pw;
  } else {
    const phone=el("r-phone")?.value.trim();
    if(!phone){ showMsg("reg-msg-1","Telefon numarası gerekli.","err"); return; }
    regData.phone=phone;
    const {error}=await sb.auth.signInWithOtp({phone});
    if(error){ showMsg("reg-msg-1","SMS gönderilemedi: "+error.message,"err"); return; }
    el("reg-otp-row").classList.remove("hidden");
    showMsg("reg-msg-1","SMS gönderildi!","ok"); return;
  }
  showStep(2);
}

async function verifyRegOTP(){
  const phone=el("r-phone")?.value.trim(), token=el("r-otp")?.value.trim();
  const {data,error}=await sb.auth.verifyOtp({phone,token,type:"sms"});
  if(error){ showMsg("reg-msg-1","Kod hatalı.","err"); return; }
  currentUser=data.user; regData.phone=phone;
  showStep(2);
}

function regStep2Next(){
  const name=el("r-name")?.value.trim(), role=el("r-role")?.value;
  const ageRange=el("r-age-range")?.value, edu=el("r-edu")?.value;

async function regComplete(){

  el("reg-done-btn").textContent="Kaydediliyor..."; el("reg-done-btn").disabled=true;
  try {
    let user = currentUser;
    if(!user && regData.email){
      const {data,error}=await sb.auth.signUp({email:regData.email,password:regData.pw,options:{data:{full_name:regData.full_name}}});
      if(error) throw error;
      user=data.user;
    }
    if(!user) throw new Error("Kullanıcı oluşturulamadı.");
    await sb.from("parents").upsert({
      id:user.id, email:user.email||regData.phone,
      full_name:regData.full_name, phone:regData.phone||null,
      role:regData.role, age_range:regData.age_range,
      education:regData.education, job:regData.job, pin:regData.pin
    });
    await sb.from("children").insert({
      parent_id:user.id, name:cname, age:parseInt(cage),
      gender:selectedGender, grade:grade, language:"tr"
    });
    currentUser=user; screenChildren();
  } catch(e){
    showMsg("reg-msg-3",e.message,"err");
    el("reg-done-btn").textContent="Bibi'ye Başla! 🚀"; el("reg-done-btn").disabled=false;
  }
}

function renderSetPin(){

}

function setPinPress(digit){
  const current = setPinStep===1 ? setPinEntry : setPinConfirm;
  if(current.length>=4) return;
  const newVal = current + digit;
  if(setPinStep===1) setPinEntry=newVal; else setPinConfirm=newVal;
  const dot = document.getElementById(`setpin-dot-${newVal.length-1}`);
  if(dot){ dot.style.background="white"; dot.style.borderColor="white"; }
  if(newVal.length===4) setTimeout(setPinNext, 150);
}

function setPinBackspace(){
  const current = setPinStep===1 ? setPinEntry : setPinConfirm;
  if(current.length===0) return;
  const dot = document.getElementById(`setpin-dot-${current.length-1}`);
  if(dot){ dot.style.background="transparent"; dot.style.borderColor="rgba(255,255,255,.3)"; }
  if(setPinStep===1) setPinEntry=setPinEntry.slice(0,-1);
  else setPinConfirm=setPinConfirm.slice(0,-1);
}

async function setPinNext(){
  if(setPinStep===1){
    // Adım 2: onay
    setPinStep=2; setPinConfirm="";
    renderSetPin();
  } else {
    // Onayla
    if(setPinEntry !== setPinConfirm){
      const err=document.getElementById("setpin-err"); if(err) err.style.display="block";
      [0,1,2,3].forEach(i=>{ const d=document.getElementById(`setpin-dot-${i}`); if(d){d.style.background="transparent";d.style.borderColor="rgba(255,255,255,.3)";} });
      setPinConfirm=""; setPinStep=1; setPinEntry="";
      setTimeout(renderSetPin, 800); return;
    }
    // Kaydet
    await sb.from("parents").update({pin:setPinEntry}).eq("id",currentUser.id);
    // Artık PIN ekranına yönlendir
    screenPinLock(setPinTarget);
  }
}

    let step = 0;
    const timer = setInterval(()=>{
      const bar = document.getElementById("loading-bar");
      const txt = document.getElementById("loading-step");
      if(bar) bar.style.width = `${Math.min(90, (step+1)*30)}%`;
      if(txt && steps[step]) txt.textContent = steps[step];
      step++;
    }, 400);

    await screenReport(child);
    clearInterval(timer);
    const bar = document.getElementById("loading-bar");
    if(bar) bar.style.width = "100%";
    await new Promise(r=>setTimeout(r,200));
    overlay.remove();

  } else {
    const err = el("pin-err"); if(err) err.style.display="block";
    [0,1,2,3].forEach(i=>{ const d=el(`pin-dot-${i}`); if(d){d.style.background="transparent";d.style.borderColor="rgba(255,255,255,.3)";} });
    pinEntry = "";
    const wrap = el("pin-dots"); if(wrap){ wrap.style.animation="none"; setTimeout(()=>wrap.style.animation="",10); }
  }
}

const TOPIC_ICONS = {"Matematik":"📐","Fen":"🔬","Dil":"📖","Tarih":"🏛️","Genel":"🌍"};
async function generateAndShowReport(childId){

  // Mevcut ekranda overlay göster — ekranı yeniden render etme
  const overlay = document.createElement("div");

  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif";
  overlay.innerHTML = `
    <div style="background:linear-gradient(135deg,#1A2E2A,#243d38);border-radius:20px;padding:28px 24px;text-align:center;max-width:280px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.4)">
      <div style="font-size:40px;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite">✨</div>
      <div style="color:white;font-size:16px;font-weight:800;margin-bottom:8px">AI Rapor Hazırlanıyor</div>
      <div style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:20px">Tüm konuşmalar analiz ediliyor...</div>
      <div style="display:flex;gap:6px;justify-content:center">
        ${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:#4ade80;animation:dotPulse 1.2s ease ${i*.2}s infinite"></div>`).join("")}
      </div>
    </div>`;
  document.body.appendChild(overlay);

  try{
    const {data:child} = await sb.from("children").select("*").eq("id",childId).single();
    if(!child){ overlay.remove(); return; }
    await generateWeeklyReport(child);

    screenReport(child);
  }catch(e){

    if(btn){ btn.textContent="✨ AI Rapor"; btn.disabled=false; }
    alert("Rapor oluşturulamadı, tekrar dene.");

}

    sb.from("sessions").select("started_at,duration_mins,message_count").eq("child_id",child.id).order("started_at",{ascending:false}).limit(5),
    sb.from("emotion_logs").select("emotion,interest_area,character_hint").eq("child_id",child.id).order("created_at",{ascending:false}).limit(30),
    sb.from("weekly_reports").select("summary,created_at").eq("child_id",child.id).order("created_at",{ascending:false}).limit(1)

function toggleReportAccordion(){
  const body = document.getElementById("report-accordion-body");
  const arrow = document.getElementById("accordion-arrow");
  if(!body) return;
  const isOpen = body.style.display !== "none";
  body.style.display = isOpen ? "none" : "block";
  if(arrow) arrow.style.transform = isOpen ? "" : "rotate(180deg)";
}

async function requestNewReport(childId){
  // 7 günlük cache kontrolü
  const {data:existing} = await sb.from("weekly_reports")
    .select("created_at")
    .eq("child_id",childId)
    .order("created_at",{ascending:false})
    .limit(1)
    .single();

  const reportAge = existing ? Math.floor((new Date()-new Date(existing.created_at))/(1000*60*60*24)) : 999;

  if(existing && reportAge < 7){
    // Mevcut raporu göster — zaten ekranda var, sadece bildir
    const btn = document.querySelector("button[onclick*='requestNewReport']");
    if(btn){
      const orig = btn.textContent;
      btn.textContent = "✅ Rapor zaten güncel!";
      btn.style.background = "linear-gradient(135deg,#0D9B7E,#16A34A)";
      setTimeout(()=>{ btn.textContent=orig; btn.style.background="linear-gradient(135deg,#1A2E2A,#0D9B7E)"; },2000);
    }
    return;
  }

  // Yeni rapor üret
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:999;display:flex;align-items:center;justify-content:center;font-family:'Nunito',sans-serif";
  overlay.innerHTML = `
    <div style="background:linear-gradient(135deg,#1A2E2A,#243d38);border-radius:20px;padding:28px 24px;text-align:center;max-width:280px;width:90%">
      <div style="font-size:40px;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite">✨</div>
      <div style="color:#1A2E2A;font-size:16px;font-weight:800;margin-bottom:6px">Rapor Hazırlanıyor</div>
      <div style="color:rgba(255,255,255,.5);font-size:13px;margin-bottom:16px">Tüm konuşmalar analiz ediliyor...</div>
      <div style="display:flex;gap:6px;justify-content:center">
        ${[0,1,2].map(i=>`<div style="width:8px;height:8px;border-radius:50%;background:#4ade80;animation:dotPulse 1.2s ease ${i*.2}s infinite"></div>`).join("")}
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const {data:child} = await sb.from("children").select("*").eq("id",childId).single();
  if(child){
    await generateWeeklyReport(child);
    overlay.remove();

// ── Fotoğraf Kırpma Sistemi ───────────────────────────────────
let cropState = null; // {img, scale, offsetX, offsetY, isDragging, startX, startY, targetChildId, isNewProfile}

function openCropModal(imageSrc, childId=null, isNewProfile=false){
  const existing = document.getElementById("crop-modal");
  if(existing) existing.remove();

  const modal = document.createElement("div");
  modal.id = "crop-modal";
  modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;font-family:'Nunito',sans-serif";

  modal.innerHTML = `
    <div style="width:100%;max-width:380px;background:#1A2E2A;border-radius:22px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)">
      <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.08)">
        <div style="color:white;font-size:16px;font-weight:900">Fotoğrafı Düzenle ✂️</div>
        <button onclick="document.getElementById('crop-modal').remove()" style="width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.1);border:none;cursor:pointer;color:white;font-size:16px">✕</button>
      </div>

      <!-- Canvas alanı — daire önizleme -->
      <div style="position:relative;margin:20px auto;width:260px;height:260px">
        <canvas id="crop-canvas" width="260" height="260"
          style="border-radius:50%;cursor:grab;display:block;touch-action:none;box-shadow:0 0 0 4px rgba(13,155,126,.6)"
          onmousedown="cropDragStart(event)" onmousemove="cropDragMove(event)" onmouseup="cropDragEnd()"
          ontouchstart="cropTouchStart(event)" ontouchmove="cropTouchMove(event)" ontouchend="cropDragEnd()"
          onwheel="cropWheel(event)">
        </canvas>
        <!-- Merkez halka -->
        <div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,255,255,.3);pointer-events:none"></div>
      </div>

      <!-- Zoom slider -->
      <div style="padding:0 24px 8px">
        <div style="display:flex;align-items:center;gap:12px">
          <span style="color:rgba(255,255,255,.4);font-size:18px">🔍</span>
          <input type="range" id="crop-zoom" min="1" max="4" step="0.01" value="1"
            style="flex:1;accent-color:#0D9B7E;cursor:pointer"
            oninput="cropZoom(this.value)"/>
          <span style="color:rgba(255,255,255,.4);font-size:22px">🔍</span>
        </div>
        <div style="color:rgba(255,255,255,.35);font-size:11px;text-align:center;margin-top:6px">Kaydır veya sürükle · Zoom için kaydırıcıyı kullan</div>
      </div>

      <!-- Butonlar -->
      <div style="display:flex;gap:10px;padding:16px 20px">
        <button onclick="document.getElementById('crop-modal').remove()" style="flex:1;padding:12px;border-radius:12px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-weight:700;cursor:pointer">İptal</button>
        <button onclick="saveCrop()" style="flex:2;padding:12px;border-radius:12px;border:none;background:#0D9B7E;color:white;font-weight:800;font-size:15px;cursor:pointer">✅ Kaydet</button>
      </div>
    </div>`;

  document.body.appendChild(modal);

  // Resmi yükle ve canvas'a çiz
  const img = new Image();
  img.onload = () => {
    const scale = Math.max(260/img.width, 260/img.height);
    cropState = {
      img, scale, offsetX:0, offsetY:0,
      isDragging:false, startX:0, startY:0,
      targetChildId: childId, isNewProfile,
      canvasSize: 260
    };
    drawCrop();
  };
  img.src = imageSrc;
}

function drawCrop(){
  const canvas = document.getElementById("crop-canvas");
  if(!canvas||!cropState) return;
  const ctx = canvas.getContext("2d");
  const {img, scale, offsetX, offsetY, canvasSize} = cropState;

  ctx.clearRect(0,0,canvasSize,canvasSize);

  const w = img.width*scale, h = img.height*scale;
  const cx = canvasSize/2, cy = canvasSize/2;
  const dx = cx - w/2 + offsetX;
  const dy = cy - h/2 + offsetY;

  // Daire clip
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx,cy,cx,0,Math.PI*2);
  ctx.clip();
  ctx.drawImage(img, dx, dy, w, h);
  ctx.restore();
}

function cropZoom(val){
  if(!cropState) return;
  const baseScale = Math.max(260/cropState.img.width, 260/cropState.img.height);
  cropState.scale = baseScale * parseFloat(val);
  clampOffset();
  drawCrop();
}

function clampOffset(){
  if(!cropState) return;
  const {img, scale, canvasSize} = cropState;
  const w = img.width*scale, h = img.height*scale;
  const maxX = Math.max(0, (w-canvasSize)/2);
  const maxY = Math.max(0, (h-canvasSize)/2);
  cropState.offsetX = Math.max(-maxX, Math.min(maxX, cropState.offsetX));
  cropState.offsetY = Math.max(-maxY, Math.min(maxY, cropState.offsetY));
}

function cropDragStart(e){ if(!cropState) return; cropState.isDragging=true; cropState.startX=e.clientX-cropState.offsetX; cropState.startY=e.clientY-cropState.offsetY; e.currentTarget.style.cursor="grabbing"; }
function cropDragMove(e){ if(!cropState||!cropState.isDragging) return; cropState.offsetX=e.clientX-cropState.startX; cropState.offsetY=e.clientY-cropState.startY; clampOffset(); drawCrop(); }
function cropDragEnd(){ if(!cropState) return; cropState.isDragging=false; const c=document.getElementById("crop-canvas"); if(c) c.style.cursor="grab"; }

function cropTouchStart(e){ e.preventDefault(); const t=e.touches[0]; cropDragStart({clientX:t.clientX,clientY:t.clientY,currentTarget:e.currentTarget}); }
function cropTouchMove(e){ e.preventDefault(); const t=e.touches[0]; cropDragMove({clientX:t.clientX,clientY:t.clientY}); }

function cropWheel(e){ e.preventDefault(); if(!cropState) return; const slider=document.getElementById("crop-zoom"); if(!slider) return; const newVal=Math.max(1,Math.min(4,parseFloat(slider.value)+(e.deltaY>0?-0.1:0.1))); slider.value=newVal; cropZoom(newVal); }

async function saveCrop(){
  if(!cropState) return;
  // 300x300 yüksek kaliteli canvas'a render et
  const output = document.createElement("canvas");
  output.width=300; output.height=300;
  const ctx = output.getContext("2d");
  const {img, scale, offsetX, offsetY} = cropState;
  const size=300;
  ctx.save();
  ctx.beginPath();
  ctx.arc(size/2,size/2,size/2,0,Math.PI*2);
  ctx.clip();
  const w=img.width*scale*(300/260), h=img.height*scale*(300/260);
  const ox=offsetX*(300/260), oy=offsetY*(300/260);
  ctx.drawImage(img, size/2-w/2+ox, size/2-h/2+oy, w, h);
  ctx.restore();

  const dataUrl = output.toDataURL("image/jpeg",0.85);
  document.getElementById("crop-modal").remove();

  if(cropState.isNewProfile){
    // Yeni profil oluşturma akışında
    newAvatarData = dataUrl;
    newAvatarType = "photo";
    const inner=document.getElementById("avatar-preview-inner");
    const preview=document.getElementById("avatar-preview");
    if(inner) inner.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>`;
    if(preview){ preview.style.border="2.5px solid #0D9B7E"; preview.style.padding="0"; }
    document.querySelectorAll(".emoji-av").forEach(btn=>{ btn.style.borderColor="#e0f0ec"; btn.style.background="#f9fafb"; btn.style.transform="scale(1)"; });
  } else if(cropState.targetChildId){
    // Mevcut profil güncelleme
    await sb.from("children").update({avatar_photo:dataUrl, avatar_emoji:null}).eq("id",cropState.targetChildId);
    closeAvatarModal();
    screenChildren();
  }
}

function handleAvatarUpload(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ alert("Fotoğraf 5MB'dan küçük olmalı."); return; }
  const reader = new FileReader();
  reader.onload = e => openCropModal(e.target.result, null, true);
  reader.readAsDataURL(file);
}

  reader.onload = e => openCropModal(e.target.result, childId, false);
  reader.readAsDataURL(file);
}

function showAddForm(){
  const form = el("add-form");
  const btn = el("show-add-btn");
  if(!form||!btn) return;
  form.classList.remove("hidden");
  btn.classList.add("hidden");
  // Form göründükten sonra scroll et
  setTimeout(()=>{
    form.scrollIntoView({behavior:"smooth", block:"start"});
  }, 100);
  // Dışarı tıklayınca kapat
  setTimeout(()=>{
    document.addEventListener("click", _outsideAddFormHandler);
  }, 200);
}

function _outsideAddFormHandler(e){
  const form = el("add-form");
  if(form && !form.contains(e.target)){
    hideAddForm();
    document.removeEventListener("click", _outsideAddFormHandler);
  }
}

function hideAddForm(){
  const form = el("add-form");
  const btn = el("show-add-btn");
  if(!form||!btn) return;
  form.classList.add("hidden");
  btn.classList.remove("hidden");
  document.removeEventListener("click", _outsideAddFormHandler);
  // Formu sıfırla
  newGender=""; newAvatarData=""; newAvatarType="";
}

async function addChild(){
  const name=el("new-name")?.value.trim(), age=el("new-age")?.value, grade=el("new-grade")?.value;

  const avatarCol = newAvatarType==="photo" ? "avatar_photo" : newAvatarType==="emoji" ? "avatar_emoji" : null;
  const insertData = {parent_id:currentUser.id, name, age:parseInt(age), gender:newGender, grade, language:"tr"};
  if(newAvatarType==="emoji") insertData.avatar_emoji = newAvatarData;
  if(newAvatarType==="photo") insertData.avatar_photo = newAvatarData;
  await sb.from("children").insert(insertData);
  newGender=""; newAvatarData=""; newAvatarType="";
  screenChildren();
}

async function deleteChild(id){

  await sb.from("children").delete().eq("id",id);
  screenChildren();
}

function addMsg(role, text){

  const row=document.createElement("div");
  row.className=`msg-row ${role}`;
  row.style.cssText="display:flex;margin-bottom:14px;animation:fadeUp .3s ease;gap:8px;align-items:flex-end";
  if(role==="user") row.style.justifyContent="flex-end";

    const avatar=document.createElement("div");
    avatar.style.cssText="flex-shrink:0;width:36px;height:36px;animation:breathe 3.5s ease-in-out infinite";
    avatar.innerHTML=bibiFaceSVG("idle",36);
    row.appendChild(avatar);
  }

  const bubble=document.createElement("div");
  bubble.style.cssText=role==="bibi"
    ? "max-width:72%;padding:12px 15px;border-radius:4px 18px 18px 18px;background:rgba(255,255,255,0.92);color:#1A2E2A;font-size:15px;line-height:1.6;box-shadow:0 2px 12px rgba(0,0,0,.12);backdrop-filter:blur(8px);font-weight:500"

  bubble.textContent=text;
  row.appendChild(bubble);

  if(role==="bibi"){
    const btn=document.createElement("button");
    btn.className="msg-speak-btn";
    btn.style.cssText="width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7;align-self:flex-end;transition:all .2s";
    btn.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="white"/></svg>';
    btn.onclick=()=>{
      if(speechActive && !speechPaused && speechCurrentText===cleanText(text)){
        // Bu mesaj okunuyor — durdur
        toggleVoice();
        btn.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="white"/></svg>';
      } else if(speechPaused && speechCurrentText===cleanText(text)){
        // Bu mesaj duraklatıldı — devam et
        toggleVoice();
      } else {
        // Yeni mesajı baştan oku
        speak(text);
      }
    };
    row.appendChild(btn);
  }

  msgsEl.appendChild(row);
  msgsEl.scrollTop=msgsEl.scrollHeight;
  if(messages.length>2){ const qp=el("quick-prompts"); if(qp) qp.style.display="none"; }
}

function setInput(v){ const i=el("chat-input"); if(i) i.value=v; }

async function sendMessage(fromVoice=false){
  const inp=el("chat-input"); if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  inp.value="";
  addMsg("user",text);
  setExpr("thinking"); setStatus("Düşünüyor...","#fbbf24");
  addTyping();

  // 6-8 yaş: input modunu takip et
  if(currentChild?.age<=8){
    if(fromVoice){
      lastInputMode="voice";
      voiceOn=true;
    } else {
      lastInputMode="text";
      voiceOn=false;
    }
    updateVoiceBtn();
  }

  const topic = detectTopic(text);
  const homeworkMode = isHomeworkQuestion(text);
  const imageRequest = detectImageRequest(text);

  // Session yoksa ilk mesajda oluştur
  if(!sessionId){
    const {data:sess} = await sb.from("sessions").insert({child_id:currentChild.id,started_at:new Date().toISOString()}).select().single();
    if(sess){ sessionId=sess.id; console.log("Session oluşturuldu:", sessionId); }
  }
  if(sessionId){
    const {error:mErr} = await sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"user",content:text,topic,language:"tr"});
    if(mErr) console.error("Mesaj kayıt hatası:", JSON.stringify(mErr));
  }
  updateMastery(currentChild.id, topic);
  analyzeEmotionAndInterest(currentChild.id, sessionId, text);

  // Görsel isteği varsa ayrıca görsel üret
  if(imageRequest){
    addImageToChat(text);
  }

  try{
    const chatMsgs = messages.map(m=>({role:m.r==="bibi"?"assistant":"user",content:m.t}));
    const reply = await callAI(buildPrompt(currentChild), chatMsgs, 1000);
    removeTyping();
    setExpr("happy"); setStatus("Seninle burada!","#4ade80");
    const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("happy",44);
    addMsg("bibi",reply||"Bir sorun oluştu 🙈");
    // 6-8 yaş + sesli mod → cevabı otomatik oku
    if(currentChild?.age<=8 && lastInputMode==="voice"){
      speak(reply);
    }
    setTimeout(()=>{ setExpr("idle"); const w=el("bibi-face-wrap"); if(w) w.innerHTML=bibiFaceSVG("idle",44); },3000);
    if(sessionId){
      const {error:aErr} = await sb.from("messages").insert({session_id:sessionId,child_id:currentChild.id,role:"assistant",content:reply,language:"tr"});
      if(aErr) console.error("Asistan mesaj hatası:", JSON.stringify(aErr));
    }
  }catch(e){
    removeTyping(); setExpr("idle");
    addMsg("bibi","Bağlantıda sorun var 😅 Tekrar dener misin?");
    setStatus("Seninle burada!","#4ade80");
  }
}

let historyOpen = false;

  panel.style.left = historyOpen ? "0" : "-110%";

async function loadHistory(){
  const listEl = el("history-list");
  if(!listEl) return;
  listEl.innerHTML=`<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:30px 0">Yükleniyor...</div>`;

  // Pinned + normal — pinned önce gelsin
  const {data:sessions} = await sb.from("sessions")
    .select("id,started_at,duration_mins,message_count,pinned")
    .eq("child_id", currentChild.id)
    .gt("message_count", 0)
    .order("pinned",{ascending:false})
    .order("started_at",{ascending:false})
    .limit(20);

  if(!sessions||sessions.length===0){
    listEl.innerHTML=`<div style="text-align:center;color:rgba(255,255,255,.3);font-size:13px;padding:40px 16px">Henüz sohbet geçmişi yok.<br/>Bibi ile konuştukça burada görünür 💬</div>`;

  }

  const sessionIds = sessions.map(s=>s.id);
  const {data:allFirstMsgs} = await sb.from("messages")
    .select("session_id,content")
    .in("session_id", sessionIds)
    .eq("role","user")
    .order("created_at",{ascending:true});

  const firstMsgMap = {};
  (allFirstMsgs||[]).forEach(m=>{
    if(!firstMsgMap[m.session_id]) firstMsgMap[m.session_id]=m.content;
  });

  listEl.innerHTML = sessions.map((s,i)=>{
    const title = firstMsgMap[s.id]
      ? (firstMsgMap[s.id].length>48 ? firstMsgMap[s.id].slice(0,48)+"..." : firstMsgMap[s.id])
      : `Sohbet ${i+1}`;
    const date = new Date(s.started_at);
    const dateStr = date.toLocaleDateString("tr-TR",{day:"numeric",month:"short"});
    const timeStr = date.toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"});
    const isActive = s.id === sessionId;
    const isPinned = s.pinned;

    return `
    <div style="position:relative;margin-bottom:8px">
      <div onclick="loadSession('${s.id}')"
        style="padding:12px 10px 12px 12px;border-radius:12px;cursor:pointer;
          background:${isPinned?"rgba(245,158,11,.12)":isActive?"rgba(13,155,126,.2)":"rgba(255,255,255,.05)"};
          border:1px solid ${isPinned?"rgba(245,158,11,.3)":isActive?"rgba(13,155,126,.4)":"rgba(255,255,255,.08)"};
          transition:background .2s;padding-right:72px"
        onmouseover="this.style.background='rgba(255,255,255,.1)'"
        onmouseout="this.style.background='${isPinned?"rgba(245,158,11,.12)":isActive?"rgba(13,155,126,.2)":"rgba(255,255,255,.05)"}'">

          ${s.duration_mins ? `<span style="color:#4ade80;font-size:11px;font-weight:600">${s.duration_mins} dk</span>` : ""}
          ${s.message_count ? `<span style="color:rgba(255,255,255,.3);font-size:11px">${s.message_count} mesaj</span>` : ""}
        </div>
      </div>

      <!-- Aksiyon butonları -->
      <div style="position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:4px">
        <button onclick="event.stopPropagation();togglePinSession('${s.id}',${isPinned})"

async function togglePinSession(sid, isPinned){

}

async function deleteSession(sid){
  if(!confirm("Bu sohbeti silmek istediğine emin misin?")) return;

  // Aktif oturumsa sıfırla
  if(sid === sessionId){
    sessionId = null;
    messages = [];
    const msgsEl = el("messages");
    if(msgsEl) msgsEl.innerHTML = "";
    const qp = el("quick-prompts"); if(qp) qp.style.display="flex";
    addMsg("bibi", currentChild.age<=8
      ? `Heyyyy ${currentChild.name}! Yeni bir sohbet başlayalım! 🎉`
      : currentChild.age<=12
      ? `Merhaba ${currentChild.name}! Yeni bir sohbet başlayalım.`
      : `Selam ${currentChild.name}. Yeni bir sohbet başlayalım.`);
  }

  // Mesajları ve session'ı sil
  await sb.from("messages").delete().eq("session_id", sid);
  await sb.from("sessions").delete().eq("id", sid);
  loadHistory(); // Listeyi yenile
}


async function loadSession(sid){

    .select("role,content,created_at")
    .eq("session_id", sid)
    .order("created_at",{ascending:true});

  if(!oldMsgs||oldMsgs.length===0){ addMsg("bibi","Bu sohbette mesaj bulunamadı."); return; }

  sessionId = sid;
  messages = [];
  const msgsEl = el("messages"); if(msgsEl) msgsEl.innerHTML="";
  const qp = el("quick-prompts"); if(qp) qp.style.display="none";

  oldMsgs.forEach(m=>{
    addMsg(m.role==="user"?"user":"bibi", m.content, false);
  });

  // Bu oturumun asset'lerini yükle ve göster
  const assets = await loadSessionAssets(sid);
  if(assets.length>0) showSessionAssets(assets);

  const msgsContainer = el("messages");
  if(msgsContainer) msgsContainer.scrollTop = msgsContainer.scrollHeight;

function backPinPress(digit){
  if(backPinEntry.length>=4) return;
  backPinEntry += digit;
  const dot = document.getElementById(`bpd-${backPinEntry.length-1}`);
  if(dot){ dot.style.background="white"; dot.style.borderColor="white"; }
  if(backPinEntry.length===4) setTimeout(checkBackPin, 150);

function backPinBackspace(){
  if(backPinEntry.length===0) return;

  if(dot){ dot.style.background="transparent"; dot.style.borderColor="rgba(255,255,255,.3)"; }
  backPinEntry = backPinEntry.slice(0,-1);

  const {data:parent} = await sb.from("parents").select("pin").eq("id",currentUser.id).single();

      if(d){ d.style.background="transparent"; d.style.borderColor="rgba(255,255,255,.3)"; }

// ── Mikrofon ─────────────────────────────────────────────────
function toggleMic(){
  if(isListening){ stopMic(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    const err=el("mic-err"); if(err){err.textContent="Tarayıcın sesli girişi desteklemiyor 😔";err.style.display="block";setTimeout(()=>err.style.display="none",3000);}
    return;
  }

  // Aktif ses varsa durdur
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  window.speechSynthesis?.cancel();
  speechActive=false;

  try{ recognition?.abort(); }catch(e){}

  recognition = new SR();
  recognition.lang = "tr-TR";
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.maxAlternatives = 1;

  const btn = el("mic-btn");
  let finalSent = false;

  recognition.onstart = ()=>{
    isListening=true; finalSent=false;
    if(btn){ btn.style.background="rgba(239,68,68,.4)"; btn.style.boxShadow="0 0 16px rgba(239,68,68,.5)"; }
    const inp=el("chat-input"); if(inp) inp.placeholder="Dinleniyor... 🎤";
  };

  recognition.onresult = e=>{
    let interim="", final="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    const inp=el("chat-input");
    if(inp) inp.value = final||interim;
    if(final && !finalSent){
      finalSent=true;
      recognition.stop();
      setTimeout(()=>sendMessage(true), 100);
    }
  };

  recognition.onerror = e=>{
    console.log("Mic hata:", e.error);
    isListening=false; finalSent=false;
    if(btn){ btn.style.background=currentChild?.age<=8?"rgba(74,222,128,.3)":"rgba(255,255,255,.12)"; btn.style.boxShadow="none"; }
    const inp=el("chat-input"); if(inp) inp.placeholder="Bibi'ye yaz veya konuş...";
    if(e.error==="no-speech"||e.error==="audio-capture"){
      const err=el("mic-err"); if(err){err.textContent="Ses algılanamadı, tekrar dene 🎤";err.style.display="block";setTimeout(()=>err.style.display="none",2000);}
    }
  };

  recognition.onend = ()=>{
    isListening=false;
    if(btn){ btn.style.background=currentChild?.age<=8?"rgba(74,222,128,.3)":"rgba(255,255,255,.12)"; btn.style.boxShadow="none"; }
    const inp=el("chat-input"); if(inp) inp.placeholder="Bibi'ye yaz veya konuş...";
  };

  try{ recognition.start(); }catch(e){ console.error("Mic başlatma hatası:", e); isListening=false; }
}

function stopMic(){
  if(recognition){ try{recognition.stop();}catch(e){} }
  isListening=false;
  const btn=el("mic-btn");
  if(btn){ btn.style.background=currentChild?.age<=8?"rgba(74,222,128,.3)":"rgba(255,255,255,.12)"; btn.style.boxShadow="none"; }

function toggleActionMenu(){


  const menu = document.getElementById("action-menu");
  const btn = document.getElementById("action-btn");
  if(!menu) return;
  const isOpen = menu.style.display !== "none";
  menu.style.display = isOpen ? "none" : "block";
  btn.style.background = isOpen ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.25)";
  btn.textContent = isOpen ? "+" : "✕";
  if(!isOpen){
    setTimeout(()=>document.addEventListener("click", _closeMenuOutside), 100);
  }
}

function _closeMenuOutside(e){
  const menu = document.getElementById("action-menu");
  const btn = document.getElementById("action-btn");
  if(menu && !menu.contains(e.target) && e.target !== btn){
    closeActionMenu();
    document.removeEventListener("click", _closeMenuOutside);
  }
}

function closeActionMenu(){
  const menu = document.getElementById("action-menu");
  const btn = document.getElementById("action-btn");
  if(menu) menu.style.display = "none";
  if(btn){ btn.style.background="rgba(255,255,255,.12)"; btn.textContent="+"; }
  document.removeEventListener("click", _closeMenuOutside);
}

// ── PPTX Üretme ──────────────────────────────────────────────
async function downloadAsPPTX(slides, title, age){
  // pptxgenjs yükle
  if(!window.PptxGenJS){
    const notif = showNotif("📊 PPTX hazırlanıyor...", false);
    await new Promise((res,rej)=>{
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.js";
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  const pptx = new window.PptxGenJS();
  pptx.layout = "LAYOUT_16x9";
  pptx.title = title;

  const colors = age<=8
    ?{bg:"1A3A5C", accent:"0D9B7E", text:"FFFFFF", sub:"AADDCC"}
    :age<=12
    ?{bg:"1E2D3D", accent:"2563EB", text:"FFFFFF", sub:"93C5FD"}
    :{bg:"0F172A", accent:"7C3AED", text:"FFFFFF", sub:"C4B5FD"};

  // Kapak slaytı
  const cover = pptx.addSlide();
  cover.background = {color: colors.bg};
  cover.addText(title, {
    x:0.5, y:1.5, w:9, h:1.5,
    fontSize: age<=8?36:age<=12?32:28,
    bold:true, color:colors.text, align:"center"
  });
  cover.addText(`${currentChild?.name||""} • Bibi ile hazırlandı`, {
    x:0.5, y:4, w:9, h:0.5,
    fontSize:14, color:colors.sub, align:"center"
  });

  // İçerik slaytları
  slides.forEach((s,i)=>{
    const slide = pptx.addSlide();
    slide.background = {color: colors.bg};

    // Başlık
    slide.addText(s.title||`Slayt ${i+1}`, {
      x:0.4, y:0.3, w:9.2, h:0.8,
      fontSize: age<=8?24:age<=12?22:20,
      bold:true, color:colors.text,
      border:{type:"none"},
      line:{color:colors.accent, width:2, dashType:"solid"}
    });

    // Slayt no
    slide.addText(`${i+1}/${slides.length}`, {
      x:8.5, y:0.1, w:1, h:0.3,
      fontSize:10, color:colors.sub, align:"right"
    });

    // Maddeler
    const points = (s.points||[]).map(p=>({
      text: p,
      options:{bullet:{type:"bullet",characterCode:"25B8",color:colors.accent}, color:colors.text, fontSize:age<=8?16:age<=12?14:13, paraSpaceBefore:6}
    }));
    if(points.length>0){
      slide.addText(points, {x:0.4, y:1.3, w:5.5, h:4.2, valign:"top"});
    }

    // Sağ görsel
    if(s.imageUrl){
      try{
        slide.addImage({path:s.imageUrl, x:6.1, y:1.1, w:3.5, h:3.5, sizing:{type:"cover"}});
      }catch(e){}
    }

    // Fun fact
    if(s.fun_fact){
      slide.addText(`💡 ${s.fun_fact}`, {
        x:0.4, y:5.6, w:9.2, h:0.6,
        fontSize:11, color:colors.sub, italic:true
      });
    }
  });

  // Bitiş slaytı
  const end = pptx.addSlide();
  end.background = {color: colors.bg};
  end.addText(age<=8?"🌟 Harika İş!":age<=12?"✅ Tebrikler!":"Sunum Tamamlandı", {
    x:0.5, y:2, w:9, h:1.2,
    fontSize:32, bold:true, color:colors.text, align:"center"
  });
  end.addText("Bibi ile öğrenmek eğlenceli!", {
    x:0.5, y:3.5, w:9, h:0.5,
    fontSize:14, color:colors.sub, align:"center"
  });

  await pptx.writeFile({fileName:`${title.slice(0,20)}-${currentChild?.name||""}.pptx`});
  showNotif("✅ PPTX indirildi!");
}

async function analyzeImageWithGroq(base64Image, prompt){
  const res = await fetch(GROQ_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${GROQ_KEY}`},
    body: JSON.stringify({
      model: "meta-llama/llama-4-scout-17b-16e-instruct",
      messages:[{
        role:"user",
        content:[
          {type:"image_url", image_url:{url:`data:image/jpeg;base64,${base64Image}`}},
          {type:"text", text: prompt}
        ]
      }],
      max_tokens: 1500
    })
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error?.message||"Vision API hatası");
  return data.choices?.[0]?.message?.content || "";
}

SORU_SAYISI: [sayı]

async function buildPDF(topic, contentType, content, age){
  if(!window.jspdf){
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
    await new Promise(r=>{s.onload=r; document.head.appendChild(s);});
  }

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210,H=297,M=18;
  let y=M;

  // Header
  doc.setFillColor(13,155,126); doc.rect(0,0,W,32,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(age<=8?20:16); doc.setFont("helvetica","bold");
  doc.text(topic, M, 15);
  doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text(`${contentType} • ${currentChild?.name||""} • ${new Date().toLocaleDateString("tr-TR")}`, W-M, 26, {align:"right"});
  doc.text("Bibi ile hazırlandı ✨", M, 26);
  y=42;

  // İçerik
  const lines2 = content.split("\n");
  for(const line of lines2){
    if(y>H-M){doc.addPage();y=M;}
    const trimmed=line.trim();
    if(!trimmed){y+=4;continue;}

    if(trimmed.startsWith("#")||trimmed.length<60&&trimmed.endsWith(":")||trimmed.match(/^\d+\./)||trimmed.match(/^[A-ZÇĞİÖŞÜ\s]{4,}$/)){
      // Başlık
      if(y>H-20){doc.addPage();y=M;}
      doc.setFontSize(age<=8?13:12); doc.setFont("helvetica","bold");
      doc.setTextColor(13,100,80);
      const clean=trimmed.replace(/^#+\s*/,"").replace(/:$/,"");
      doc.text(clean, M, y); y+=8;
      doc.setFillColor(13,155,126,0.3); doc.rect(M,y,W-M*2,0.5,"F"); y+=4;
    } else {
      // Normal metin
      doc.setFontSize(age<=8?12:11); doc.setFont("helvetica","normal");
      doc.setTextColor(30,30,30);
      const wrapped=doc.splitTextToSize(trimmed, W-M*2);
      wrapped.forEach(l=>{
        if(y>H-M){doc.addPage();y=M;}
        doc.text(l,M,y); y+=age<=8?7:6;
      });
      y+=2;
    }
  }

  // Footer
  doc.setFontSize(8); doc.setTextColor(150,150,150);
  doc.text("bibi ile öğrenmek eğlenceli! • bibi-app-rho.vercel.app", W/2, H-8, {align:"center"});

  doc.save(`bibi-${topic.slice(0,20)}-${currentChild?.name||""}.pdf`);
  showNotif("✅ PDF indirildi!");
}

`"${topic}" hakkında kapsamlı ve detaylı bir sunu hazırla.

${agePrompt}
Kapak ve bitiş slaytı hariç ${slideCount} içerik slaytı.

ÖNEMLİ KURALLAR:
- Her slayt GERÇEK ve DOĞRU bilgi içermeli

- Her slayt için "image_query" alanı: o slaytın konusunu en iyi temsil eden İngilizce görsel arama terimi (3-5 kelime, fotoğraf kalitesinde)

  "slides": [
    {
      "title": "Slayt Başlığı",
      "points": ["Madde 1", "Madde 2", "Madde 3", "Madde 4"],
      "fun_fact": "İlginç bilgi",
      "image_query": "İngilizce görsel arama terimi"
    }
  ],
  "ending": "Kapanış mesajı"

let speechWords = [];
let speechWordIndex = 0;
let speechPaused = false;
let speechActive = false;
let speechCurrentText = "";
let currentAudio = null; // ElevenLabs audio element

function cleanText(text){
  return text
    .replace(/[\u{1F000}-\u{1FFFF}]/gu,"")
    .replace(/[\u{2600}-\u{27BF}]/gu,"")
    .replace(/[\u{1F300}-\u{1F9FF}]/gu,"")
    .replace(/[\u2702-\u27B0]/gu,"")
    .replace(/[★☆♥♦♣♠•◦▪▫►◄▲▼]/g,"")
    .replace(/━+/g," ").replace(/\s+/g," ").trim();
}

async function speak(text){
  if(!voiceOn) return;
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  window.speechSynthesis?.cancel();
  speechPaused=false; speechActive=false;
  const clean=cleanText(text); if(!clean) return;
  speechCurrentText=clean;
  speechWords=clean.split(/\s+/).filter(Boolean);
  speechWordIndex=0;

  if(elevenLabsEnabled){
    await speakElevenLabs(clean);
  } else {
    speakBrowser(clean);
  }
}

async function speakElevenLabs(text){
  try{
    setExpr("talking"); setStatus("Konuşuyor...","#a78bfa");
    const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("talking",44);
    speechActive=true; updateVoiceBtn();

    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${selectedVoiceId}`,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "xi-api-key": ELEVENLABS_KEY
      },
      body: JSON.stringify({
        text,
        model_id: "eleven_multilingual_v2",
        voice_settings:{
          stability: 0.4,
          similarity_boost: 0.8,
          style: 0.2,
          use_speaker_boost: false
        },
        output_format: "mp3_22050_32"
      })
    });

    if(!res.ok) throw new Error("ElevenLabs hata: "+res.status);

    const blob = await res.blob();
    // Önceki ses hâlâ duruyorsa iptal
    if(!speechActive){ return; }
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.preload = "auto";
    currentAudio = audio;

    await new Promise((resolve)=>{
      audio.oncanplaythrough = ()=>{ audio.play().catch(()=>{}); };
      audio.onended = ()=>{
        speechActive=false; speechPaused=false;
        URL.revokeObjectURL(url); currentAudio=null;
        setExpr("idle"); setStatus(`${currentChild?.name||""} ile`,"#4ade80");
        const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("idle",44);
        updateVoiceBtn(); resolve();
      };
      audio.onerror = ()=>{ resolve(); };
      audio.load();
    });
  }catch(e){
    console.error("ElevenLabs hatası:", e);
    speechActive=false; updateVoiceBtn(); setExpr("idle");
    speakBrowser(text);
  }
}

function speakBrowser(text){
  if(!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang="tr-TR";
  const age=currentChild?.age||9;
  if(age<=8){u.rate=0.82;u.pitch=1.45;}
  else if(age<=12){u.rate=0.88;u.pitch=1.20;}
  else{u.rate=0.92;u.pitch=1.05;}
  const vs=window.speechSynthesis.getVoices();
  const tv=vs.find(v=>v.lang.startsWith("tr")); if(tv) u.voice=tv;
  u.onstart=()=>{speechActive=true;setExpr("talking");setStatus("Konuşuyor...","#a78bfa");const wrap=el("bibi-face-wrap");if(wrap)wrap.innerHTML=bibiFaceSVG("talking",44);updateVoiceBtn();};
  u.onend=()=>{speechActive=false;setExpr("idle");setStatus(`${currentChild?.name||""} ile`,"#4ade80");const wrap=el("bibi-face-wrap");if(wrap)wrap.innerHTML=bibiFaceSVG("idle",44);updateVoiceBtn();};
  window.speechSynthesis.speak(u);
}

function toggleVoice(){
  if(!window.speechSynthesis && !elevenLabsEnabled) return;

  if(speechActive && !speechPaused){
    // Durdur
    speechPaused=true; speechActive=false;
    if(currentAudio){ currentAudio.pause(); }
    else { window.speechSynthesis?.pause(); }
    setExpr("idle"); setStatus("Duraklatıldı ⏸","#fbbf24");
    const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("idle",44);
    updateVoiceBtn();
  } else if(speechPaused){
    // Devam et
    speechPaused=false; speechActive=true;
    if(currentAudio){ currentAudio.play(); setExpr("talking"); setStatus("Konuşuyor...","#a78bfa"); const wrap=el("bibi-face-wrap"); if(wrap) wrap.innerHTML=bibiFaceSVG("talking",44); }
    else { window.speechSynthesis?.resume(); }
    updateVoiceBtn();
  } else {
    voiceOn=!voiceOn;
    if(!voiceOn){ if(currentAudio){currentAudio.pause();currentAudio=null;} window.speechSynthesis?.cancel(); speechActive=false; }
    updateVoiceBtn();
  }
}

    btn.style.borderColor = voiceOn ? "rgba(255,255,255,.35)" : "rgba(255,255,255,.2)";
    btn.innerHTML = voiceOn
      ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="white"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="white" stroke-width="2" stroke-linecap="round"/></svg><span style="color:white;font-size:11px;font-weight:700;margin-left:4px">Ses Açık</span>`
      : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="rgba(255,255,255,.4)"/><line x1="23" y1="9" x2="17" y2="15" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-linecap="round"/><line x1="17" y1="9" x2="23" y2="15" stroke="rgba(255,255,255,.4)" stroke-width="2" stroke-linecap="round"/></svg><span style="color:rgba(255,255,255,.5);font-size:11px;font-weight:700;margin-left:4px">Ses Kapalı</span>`;
  }
  document.querySelectorAll(".msg-speak-btn").forEach(b=>{
    if(speechActive&&!speechPaused){b.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="6" height="12" rx="1" fill="white"/><rect x="12" y="3" width="6" height="12" rx="1" fill="white"/></svg>';}
    else if(speechPaused){b.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><polygon points="5,2 18,9 5,16" fill="white"/></svg>';}
    else{b.innerHTML='<svg width="9" height="9" viewBox="0 0 24 24" fill="none"><polygon points="5,3 19,12 5,21" fill="white"/></svg>';}
  });
}

// ══════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════
window.onload = async () => {
  screenLoading();
  // Supabase bağlantısını önceden ısındır
  sb.from("parents").select("id").limit(1).then(()=>{}).catch(()=>{});
  const t=setTimeout(()=>screenAuth(),5000);
  try {
    const {data:{session}}=await sb.auth.getSession();
    clearTimeout(t);
    if(session?.user){ currentUser=session.user; screenChildren(); }
    else screenAuth();
  } catch(e){ clearTimeout(t); screenAuth(); }
  sb.auth.onAuthStateChange((_,session)=>{
    if(session?.user){ currentUser=session.user; if(!currentChild) checkProfileAndRoute(); }
    else{ currentUser=null; screenAuth(); }
  });
};
</script>
